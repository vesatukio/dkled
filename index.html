<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duta Terang LED</title>
<style>
body{font-family:sans-serif;margin:0;background:#f9f9f9;padding-bottom:80px}
header{background:#00bcd4;color:#fff;padding:12px;text-align:center;font-size:1.2em;font-weight:bold}

/* Kategori */
#kategori{display:flex;flex-wrap:wrap;gap:5px;padding:10px}
#kategori button{background:#00e5ff;border:none;border-radius:20px;padding:5px 10px;font-size:0.9em}

/* Produk */
#produk{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px}
.card{background:#fff;border-radius:10px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,.1);display:flex;flex-direction:column;justify-content:space-between}
.card h4{margin:0 0 5px 0;font-size:1em}
.harga{color:#e91e63;font-weight:bold}
.qty{display:flex;gap:5px;margin-top:5px}
.qty button{width:30px;background:#ddd;border:none;border-radius:5px}
.qty input{width:40px;text-align:center;border-radius:5px;border:1px solid #ccc}

/* Floating total barang + harga */
#floatingTotal {
  position: fixed;
  bottom: 70px;
  right: 10px;
  background: #fff;
  padding: 6px 12px;
  border-radius: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  font-weight: bold;
  z-index: 2;
  display: flex;
  gap: 10px;
  align-items: center;
}

/* Footer horizontal */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  box-shadow: 0 -2px 5px rgba(0,0,0,.1);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 5px 0;
  z-index: 1;
}

/* Tombol footer */
.footer > div {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.footer button {
  background: #4caf50;
  color: white;
  border: none;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 1.5em;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}
.footer .reset { background: #f44336; }
.footer .admin { background: #555; }

/* Jumlah keranjang di ikon */
#cartCount {
  position: absolute;
  top: -5px;
  right: -5px;
  background: red;
  color: white;
  font-size: 0.8em;
  width: 20px;
  height: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
}

/* Admin panel */
.admin-panel { display: none; padding: 10px; background: #ffecb3; border-radius: 10px; margin: 10px; }
.admin-panel div{margin-bottom:5px;}
.admin-panel input { width: 50px; margin: 0 5px; }
</style>
</head>
<body>

<header>Duta Terang LED</header>
<div id="kategori"></div>
<div id="produk"></div>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-panel">
  <h4>Admin Panel</h4>
  <div id="adminContent"></div>
</div>

<!-- Floating total harga & barang -->
<div id="floatingTotal">
  <span id="cartCount">0</span> Barang
  <span id="totalHarga">Rp 0</span>
</div>

<div class="footer">
  <!-- Keranjang -->
  <div style="text-align:center;position:relative;">
    <button onclick="checkout()">🛒</button>
    <div style="font-size:10px;margin-top:2px;">Keranjang</div>
  </div>

  <!-- Reset -->
  <div style="text-align:center;">
    <button class="reset" onclick="resetCart()">🔄</button>
    <div style="font-size:10px;">Reset</div>
  </div>

  <!-- Admin -->
  <div style="text-align:center;">
    <button class="admin" onclick="loginAdmin()">⚙️</button>
    <div style="font-size:10px;">Admin</div>
  </div>
</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyvF-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";
const noWA = "6288224166270";

let produkList = [];
let cart = JSON.parse(localStorage.getItem("cart")||"{}");

// Ambil data Google Sheet
fetch(apiURL)
.then(res=>res.json())
.then(data=>{
 let rows = data.data || data;
 rows.forEach((r,i)=>{
  produkList.push({
    id: i,
    nama: r.nama,
    harga: parseInt(r.harga),
    diskon1: parseInt(r.diskon1||0),
    diskon2: parseInt(r.diskon2||0),
    diskon3: parseInt(r.diskon3||0),
    kategori: r.kategori
  });
 });
 tampilKategori();
 tampil();
});

// Hitung harga
function hitungHarga(p, qty){
 let harga = p.harga;
 if(qty >= 100 && p.diskon3) harga = p.harga * (1 - p.diskon3/100);
 else if(qty >= 50 && p.diskon2) harga = p.harga * (1 - p.diskon2/100);
 else if(qty >= 10 && p.diskon1) harga = p.harga * (1 - p.diskon1/100);
 return Math.round(harga);
}

// Tampilkan produk
function tampil(){
 let html="";
 produkList.forEach(p=>{
  let qty = cart[p.id]||0;
  let hargaFinal = hitungHarga(p, qty);
  let diskonText="";
  if(p.diskon1) diskonText += `10 pcs diskon ${p.diskon1}%<br>`;
  if(p.diskon2) diskonText += `50 pcs diskon ${p.diskon2}%<br>`;
  if(p.diskon3) diskonText += `100 pcs diskon ${p.diskon3}%`;
  html+=`
  <div class="card">
    <h4>${p.nama}</h4>
    <div style="font-size:12px;color:#888">Normal: Rp ${p.harga.toLocaleString()}</div>
    <div class="harga">Rp ${hargaFinal.toLocaleString()}</div>
    ${diskonText? `<small>${diskonText}</small>` : ""}
    <div class="qty">
      <button onclick="ubah(${p.id},-1)">-</button>
      <input value="${qty}" onchange="manual(${p.id},this.value)">
      <button onclick="ubah(${p.id},1)">+</button>
    </div>
  </div>`;
 });
 document.getElementById("produk").innerHTML = html;
 hitungTotal();
}

// Tampilkan kategori
function tampilKategori(){
 let unik = [...new Set(produkList.map(p=>p.kategori))];
 let html = `<button onclick="filter('')">Semua</button>`;
 unik.forEach(k=> html+=`<button onclick="filter('${k}')">${k}</button>`);
 document.getElementById("kategori").innerHTML = html;
}

function filter(k){
 if(!k) {
   tampil();
 } else {
   let data = produkList.filter(p => p.kategori == k);
   let html = "";
   data.forEach(p => {
     let qty = cart[p.id] || 0;
     let hargaFinal = hitungHarga(p, qty);
     let diskonText = "";
     if(p.diskon1) diskonText += `10 pcs diskon ${p.diskon1}%<br>`;
     if(p.diskon2) diskonText += `50 pcs diskon ${p.diskon2}%<br>`;
     if(p.diskon3) diskonText += `100 pcs diskon ${p.diskon3}%`;

     html += `
     <div class="card">
       <h4>${p.nama}</h4>
       <div style="font-size:12px;color:#888">Normal: Rp ${p.harga.toLocaleString()}</div>
       <div class="harga">Rp ${hargaFinal.toLocaleString()}</div>
       ${diskonText ? `<small>${diskonText}</small>` : ""}
       <div class="qty">
         <button onclick="ubah(${p.id},-1)">-</button>
         <input value="${qty}" onchange="manual(${p.id},this.value)">
         <button onclick="ubah(${p.id},1)">+</button>
       </div>
     </div>`;
   });
   document.getElementById("produk").innerHTML = html;
 }
}

// Ubah jumlah produk
function ubah(id,val){ cart[id]=(cart[id]||0)+val; if(cart[id]<0) cart[id]=0; simpan(); }
function manual(id,val){ cart[id]=parseInt(val)||0; simpan(); }
function simpan(){ localStorage.setItem("cart",JSON.stringify(cart)); tampil(); hitungTotal(); }

// Hitung total & jumlah produk
function hitungTotal(){
 let total=0, count=0;
 produkList.forEach(p=>{
   let qty = cart[p.id]||0;
   total += qty*hitungHarga(p,qty);
   count += qty;
 });
 document.getElementById("cartCount").innerText = count;
 document.getElementById("totalHarga").innerText = `Barang: ${count} | Total: Rp ${total.toLocaleString()}`;
}

// Reset keranjang
function resetCart(){ cart={}; simpan(); }

// Checkout WA: nama + jumlah
function checkout(){
 let text="Halo, saya mau order:\n\n";
 produkList.forEach(p=>{
   let q=cart[p.id];
   if(q>0){
     text += `${p.nama} x${q}\n`;
   }
 });
 window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(text)}`);
}

// Login Admin
function loginAdmin(){
 let pass = prompt("Password Admin:");
 if(pass==="12345"){ document.getElementById("adminPanel").style.display="block"; tampilAdmin(); }
 else alert("Password salah!");
}

// Admin panel
function tampilAdmin(){
 let html="";
 produkList.forEach(p=>{
   html+=`<div>${p.nama} | Harga: <input type="number" value="${p.harga}" onchange="ubahAdmin(${p.id},'harga',this.value)">
   Diskon10: <input type="number" value="${p.diskon1}" onchange="ubahAdmin(${p.id},'diskon1',this.value)">
   Diskon50: <input type="number" value="${p.diskon2}" onchange="ubahAdmin(${p.id},'diskon2',this.value)">
   Diskon100: <input type="number" value="${p.diskon3}" onchange="ubahAdmin(${p.id},'diskon3',this.value)"></div>`;
 });
 document.getElementById("adminContent").innerHTML = html;
}

function ubahAdmin(id,field,val){ produkList[id][field] = parseInt(val)||0; tampil(); }
</script>
</body>
</html>
