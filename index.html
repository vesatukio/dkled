<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Lampu</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body class="bg-gray-100 pb-32">

<!-- HEADER -->
<div class="bg-orange-500 p-4 sticky top-0 z-50">
<h1 class="text-white font-bold text-center text-xl">DK Lampu</h1>

<input id="search" placeholder="Cari lampu..."
class="w-full mt-2 p-2 rounded text-sm">
</div>


<!-- PRODUK -->
<div id="produk-list" class="grid grid-cols-2 gap-3 p-3"></div>


<!-- TOTAL -->
<div id="totalBox" class="fixed bottom-16 left-0 right-0 bg-white border-t p-3 shadow">

<div class="flex justify-between text-sm font-bold">
<span>Total</span>
<span id="totalHarga">Rp 0</span>
</div>

<button onclick="kirimWA()"
class="w-full mt-2 bg-orange-500 text-white p-2 rounded">
Pesan via WhatsApp
</button>

</div>


<!-- MENU BAWAH -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around text-xs">

<button onclick="resetCart()">Reset</button>
<button onclick="scrollTo(0,0)">Katalog</button>
<button onclick="kirimWA()">Pesan</button>

</div>


<script>

const firebaseConfig = {
apiKey: "AIzaSyAt3fn56ya8pHhOg4DQujC3OUQRAO6Au04",
authDomain: "katalog-lampu.firebaseapp.com",
databaseURL: "https://katalog-lampu-default-rtdb.firebaseio.com",
projectId: "katalog-lampu",
storageBucket: "katalog-lampu.appspot.com",
messagingSenderId: "229844385794",
appId: "1:229844385794:web:117057f8bd66879b45a71b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cart = JSON.parse(localStorage.getItem("cart")) || {};

function tampilkanProduk(){

db.ref("produk").on("value", snap => {

const list = document.getElementById("produk-list");
list.innerHTML="";

snap.forEach(child =>{

const p = child.val();
const id = child.key;

let qty = cart[id] ? cart[id].qty : 0;

list.innerHTML +=`

<div class="bg-white p-3 rounded shadow text-sm">

<h3 class="font-bold">${p.nama}</h3>
<p class="text-orange-500 font-bold">
Rp ${Number(p.harga).toLocaleString()}
</p>

<div class="flex items-center gap-1 mt-2">

<button onclick="kurang('${id}',${p.harga})"
class="bg-orange-500 text-white w-7 h-7 rounded">-</button>

<input id="qty_${id}" value="${qty}"
class="w-full text-center border rounded h-7 text-xs">

<button onclick="tambah('${id}',${p.harga})"
class="bg-orange-500 text-white w-7 h-7 rounded">+</button>

</div>

</div>
`

})

})

}

function tambah(id,harga){

if(!cart[id]) cart[id]={qty:0,harga:harga}

cart[id].qty++

updateCart()

}

function kurang(id,harga){

if(!cart[id]) return

cart[id].qty--

if(cart[id].qty<=0) delete cart[id]

updateCart()

}

function updateCart(){

localStorage.setItem("cart",JSON.stringify(cart))

let total=0

for(let id in cart){

total += cart[id].qty * cart[id].harga

}

document.getElementById("totalHarga").innerText =
"Rp "+total.toLocaleString()

tampilkanProduk()

}

function resetCart(){

cart={}

localStorage.removeItem("cart")

updateCart()

}

function kirimWA(){

let pesan="Order DK Lampu%0A%0A"

for(let id in cart){

let qty = cart[id].qty

pesan += qty+" pcs%0A"

}

window.open("https://wa.me/6288224166270?text="+pesan)

}

document.getElementById("search").addEventListener("keyup",function(){

let kata = this.value.toLowerCase()

let card = document.querySelectorAll("#produk-list div")

card.forEach(c=>{

if(c.innerText.toLowerCase().includes(kata))
c.style.display="block"
else
c.style.display="none"

})

})

tampilkanProduk()

</script>

</body>
</html>
