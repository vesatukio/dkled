<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DK Lampu</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.harga{
color:#ee4d2d;
font-weight:bold;
font-size:16px;
}

.nama{
font-size:14px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="bg-orange-500 text-white text-center p-3 font-bold">
DK Lampu
</div>

<input id="search" placeholder="Cari produk"
class="w-full p-2 border">

<div id="produk-list" class="grid grid-cols-2 gap-3 p-3"></div>


<div id="orderBox" class="fixed bottom-12 left-0 right-0 bg-white p-3 border">

<div class="flex justify-between">

<div>Total :</div>

<div id="total">Rp 0</div>

</div>

<button onclick="orderWA()"
class="w-full bg-orange-500 text-white p-2 mt-2">

Pesan WhatsApp

</button>

</div>


<div class="fixed bottom-0 left-0 right-0 bg-white border flex justify-around p-2">

<button onclick="resetCart()">Reset</button>

<button onclick="lihatCart()">Keranjang</button>

<button onclick="loginAdmin()">Akun</button>

</div>


<script>

const firebaseConfig = {

apiKey: "AIzaSyAt3fn56ya8pHhOg4DQujC3OUQRAO6Au04",

authDomain: "katalog-lampu.firebaseapp.com",

databaseURL: "https://katalog-lampu-default-rtdb.firebaseio.com",

projectId: "katalog-lampu"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

let cart = JSON.parse(localStorage.getItem("cart")) || {}

function tampilkanProduk(){

db.ref("produk").on("value",snap=>{

let list = document.getElementById("produk-list")

list.innerHTML=""

snap.forEach(child=>{

let p = child.val()

let id = child.key

let harga = p.harga - (p.diskon || 0)

list.innerHTML+=`

<div class="bg-white p-2">

<div class="nama">${p.nama}</div>

<div class="text-gray-400 text-xs">${p.kategori}</div>

<div class="text-gray-400 line-through text-xs">
Rp ${p.harga}
</div>

<div class="harga">
Rp ${harga}
</div>

<div class="flex mt-2">

<button onclick="kurang('${id}',${harga})">-</button>

<input id="q_${id}" value="0"
class="w-full text-center border">

<button onclick="tambah('${id}',${harga})">+</button>

</div>

</div>

`

})

})

}

function tambah(id,h){

if(!cart[id]) cart[id]={qty:0,harga:h}

cart[id].qty++

updateCart()

}

function kurang(id,h){

if(!cart[id]) return

cart[id].qty--

if(cart[id].qty<=0) delete cart[id]

updateCart()

}

function updateCart(){

localStorage.setItem("cart",JSON.stringify(cart))

let total=0

for(let i in cart){

total+=cart[i].qty*cart[i].harga

}

document.getElementById("total").innerText="Rp "+total

}

function resetCart(){

cart={}

updateCart()

}

function orderWA(){

let pesan="Order DK Lampu%0A%0A"

for(let i in cart){

pesan+=cart[i].qty+" pcs%0A"

}

window.open("https://wa.me/6288224166270?text="+pesan)

}

function loginAdmin(){

let pass=prompt("Password admin")

if(pass=="dklampu"){

alert("Login berhasil")

}

}

tampilkanProduk()

</script>

</body>
</html>
