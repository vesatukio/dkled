<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DK Lampu</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-bottom:120px;
}

.header{
background:#ff6a00;
color:white;
padding:14px;
font-size:18px;
text-align:center;
font-weight:bold;
}

.search{
padding:10px;
background:white;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
}

.nama{
font-size:14px;
margin-bottom:5px;
}

.harga{
color:#ff6a00;
font-weight:bold;
margin-bottom:8px;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.qty button{
width:30px;
height:30px;
border:none;
background:#ff6a00;
color:white;
font-size:18px;
border-radius:6px;
}

.qty input{
width:40px;
text-align:center;
}

/* FLOAT ORDER */

.orderBox{
position:fixed;
right:15px;
bottom:90px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.orderBtn{
background:#25D366;
color:white;
padding:10px 15px;
border-radius:20px;
margin-top:5px;
text-align:center;
}

/* MENU BAWAH */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
border-top:1px solid #ddd;
}

.bottom button{
flex:1;
padding:14px;
border:none;
background:white;
font-size:16px;
}

.badge{
background:red;
color:white;
border-radius:50%;
padding:2px 7px;
font-size:12px;
}

</style>
</head>

<body>

<div class="header">
DK Lampu
</div>

<div class="search">
<input type="text" id="cari" placeholder="Cari produk..." onkeyup="cariProduk()">
</div>

<div class="grid" id="produk"></div>

<div class="orderBox">
<div>Total : Rp <span id="total">0</span></div>
<div class="orderBtn" onclick="kirimWA()">Order WA</div>
</div>

<div class="bottom">
<button onclick="resetCart()">Reset</button>
<button onclick="lihatKeranjang()">Keranjang <span id="jumlahCart" class="badge">0</span></button>
<button onclick="menuAkun()">Akun</button>
</div>

<script>

let kategori = JSON.parse(localStorage.getItem("kategori")) || ["Lampu","Driver"]

let produk = JSON.parse(localStorage.getItem("produk")) || [
{nama:"Lampu LED 5W",harga:5000,kategori:"Lampu"},
{nama:"Lampu LED 10W",harga:7000,kategori:"Lampu"},
{nama:"Lampu LED 15W",harga:9000,kategori:"Lampu"},
{nama:"Driver LED 18W",harga:6000,kategori:"Driver"}
]

let cart = JSON.parse(localStorage.getItem("cart")) || {}

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

let qty = cart[i] || 0

html+=`

<div class="card">

<div class="nama">${p.nama}</div>
<div>${p.kategori}</div>

<div class="harga">Rp ${p.harga}</div>

<div class="qty">

<button onclick="kurang(${i})">-</button>

<input type="number" value="${qty}" onchange="manual(${i},this.value)">

<button onclick="tambah(${i})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

hitungTotal()

}

function tambah(i){

cart[i]=(cart[i]||0)+1
simpan()

}

function kurang(i){

if(cart[i]){
cart[i]--
if(cart[i]<=0) delete cart[i]
}

simpan()

}

function manual(i,val){

if(val<=0){
delete cart[i]
}else{
cart[i]=Number(val)
}

simpan()

}

function simpan(){

localStorage.setItem("cart",JSON.stringify(cart))
localStorage.setItem("produk",JSON.stringify(produk))
localStorage.setItem("kategori",JSON.stringify(kategori))

tampilProduk()

}

function hitungTotal(){

let total=0
let jumlah=0

for(let i in cart){

total+=produk[i].harga*cart[i]
jumlah+=cart[i]

}

document.getElementById("total").innerText=total
document.getElementById("jumlahCart").innerText=jumlah

}

/* PENCARIAN */

function cariProduk(){

let k=document.getElementById("cari").value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(k)?"block":"none"

})

}

/* WHATSAPP */

function kirimWA(){

let text="Order DK Lampu:%0A"

for(let i in cart){

text+=produk[i].nama+" x"+cart[i]+"%0A"

}

text+="Total: Rp "+document.getElementById("total").innerText

window.open("https://wa.me/6288224166270?text="+text)

}

/* RESET */

function resetCart(){

cart={}
simpan()

}

/* KERANJANG */

function lihatKeranjang(){

let text="Keranjang:%0A"

for(let i in cart){

text+=produk[i].nama+" x"+cart[i]+"\n"

}

alert(text)

}

/* MENU AKUN */

function menuAkun(){

let pilih = prompt(

"1 Tambah Produk\n2 Hapus Produk\n3 Tambah Kategori\n4 Hapus Kategori"

)

if(pilih==1){

let nama=prompt("Nama produk")
let harga=prompt("Harga")
let kat=prompt("Kategori")

produk.push({nama:nama,harga:Number(harga),kategori:kat})

}

if(pilih==2){

let no=prompt("Nomor produk (1-"+produk.length+")")

produk.splice(no-1,1)

}

if(pilih==3){

let k=prompt("Nama kategori")

kategori.push(k)

}

if(pilih==4){

let no=prompt("Nomor kategori")

kategori.splice(no-1,1)

}

simpan()

}

tampilProduk()

</script>

</body>
</html>
