<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duta Terang LED</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:10px;text-align:center}

#produk{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1)
}

.harga{color:red;font-weight:bold}

.qty{
display:flex;
gap:5px;
margin-top:5px
}

.qty button{
width:30px;
background:#ddd;
border:none;
}

.qty input{
width:40px;
text-align:center;
}

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
padding:10px;
box-shadow:0 -2px 5px rgba(0,0,0,.1)
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
}
</style>
</head>

<body>

<header><h2>Duta Terang LED</h2></header>
<div id="kategori" style="padding:10px"></div>
<div id="produk"></div>

<div class="footer">
<div id="total">Total: Rp 0</div>
<button onclick="checkout()">Checkout WhatsApp</button>
<button onclick="resetCart()" style="background:red;margin-top:5px">Reset Keranjang</button>
 <button onclick="loginAdmin()" style="background:#333;margin-top:5px">
Admin
</button>

<script>
function loginAdmin(){
 let pass = prompt("Password Admin:");
 if(pass === "12345"){
   window.open("admin.html");
 }else{
   alert("Salah!");
 }
}
</script>
</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyvF-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";
const noWA = "6288224166270";

let produkList = [];
let cart = JSON.parse(localStorage.getItem("cart")||"{}");

fetch(apiURL)
.then(res=>res.json())
.then(data=>{
 let rows=data.data||data;

 rows.forEach(r=>{
  produkList.push({
    nama:r.nama,
    harga:parseInt(r.harga),
    diskon1:parseInt(r.diskon1||0),
    diskon2:parseInt(r.diskon2||0),
    kategori:r.kategori
  });
 });

 tampilKategori();
 tampil();
});

function hitungHarga(p, qty){
 let harga = p.harga;

 if(qty >= 50 && p.diskon2){
   harga = p.harga - (p.harga * p.diskon2 / 100);
 } else if(qty >= 10 && p.diskon1){
   harga = p.harga - (p.harga * p.diskon1 / 100);
 }

 return Math.round(harga);
}

function tampil(){
 let html="";

 produkList.forEach((p,i)=>{

 let qty = cart[i] || 0;
 let hargaFinal = hitungHarga(p, qty);

 html+=`
 <div class="card">
  <h4>${p.nama}</h4>

  <div style="font-size:12px;color:#888">
    Normal: Rp ${p.harga.toLocaleString()}
  </div>

  <div class="harga">
    Rp ${hargaFinal.toLocaleString()}
  </div>

  <small>
    10 pcs diskon ${p.diskon1 || 0}%<br>
    50 pcs diskon ${p.diskon2 || 0}%
  </small>

  <div class="qty">
    <button onclick="ubah(${i},-1)">-</button>
    <input value="${qty}" onchange="manual(${i},this.value)">
    <button onclick="ubah(${i},1)">+</button>
  </div>
 </div>
 `;
 });

 document.getElementById("produk").innerHTML=html;
 hitungTotal();
}

function tampilKategori(){
 let unik = [...new Set(produkList.map(p=>p.kategori))];

 let html = `<button onclick="filter('')">Semua</button>`;

 unik.forEach(k=>{
   html += `<button onclick="filter('${k}')">${k}</button>`;
 });

 document.getElementById("kategori").innerHTML = html;
}

function filter(k){
 if(!k) tampil();
 else tampilFilter(k);
}

function tampilFilter(kat){
 let data = produkList.filter(p=>p.kategori==kat);

 let html="";
 data.forEach((p,i)=>{
 let qty = cart[i] || 0;
 let hargaFinal = hitungHarga(p, qty);

 html+=`
 <div class="card">
  <h4>${p.nama}</h4>
  <div class="harga">Rp ${hargaFinal.toLocaleString()}</div>
 </div>
 `;
 });

 document.getElementById("produk").innerHTML=html;
}

function ubah(i,val){
 cart[i]=(cart[i]||0)+val;
 if(cart[i]<0) cart[i]=0;
 simpan();
}

function manual(i,val){
 cart[i]=parseInt(val)||0;
 simpan();
}

function simpan(){
 localStorage.setItem("cart",JSON.stringify(cart));
 tampil();
}

function hitungTotal(){
 let total=0;

 produkList.forEach((p,i)=>{
  let qty = cart[i]||0;
  let harga = hitungHarga(p, qty);
  total += qty * harga;
 });

 document.getElementById("total").innerText =
 "Total: Rp " + total.toLocaleString();
}

function checkout(){
 let text="Halo, saya mau order:\n\n";
 let total=0;

 produkList.forEach((p,i)=>{
  let q=cart[i];
  if(q>0){
    let harga = hitungHarga(p,q);
    text+=`${p.nama} x${q} = Rp ${(q*harga).toLocaleString()}\n`;
    total+=q*harga;
  }
 });

 text+=`\nTotal: Rp ${total.toLocaleString()}`;

 window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
