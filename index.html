<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duta Terang LED</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
header{background:#222;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.produk{background:#fff;margin-bottom:10px;padding:10px;border-radius:6px}
button{padding:6px 10px;border:none;border-radius:4px;cursor:pointer}
.btn-cart{background:#28a745;color:#fff}
.btn-wa{background:#25D366;color:#fff;width:100%;margin-top:5px}
.cart{
 position:fixed;
 bottom:0;left:0;right:0;
 background:#fff;
 padding:10px;
 border-top:2px solid #ccc;
}
.kategori button{
 background:#007bff;
 color:#fff;
 margin:3px;
}
</style>
</head>

<body>

<header>
<h2>Duta Terang LED</h2>
</header>

<div class="container">

<div class="kategori" id="kategori"></div>

<div id="produkList"></div>

</div>

<div class="cart">
<b>Total: Rp <span id="total">0</span></b>
<button class="btn-wa" onclick="checkout()">Order via WhatsApp</button>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxKHul7tT96vHxQmSa1Q14MABbd6ho5ftGv7hm7ntT3e7KzxMxSw1FuiNPrwB8VbJ2o/exec";
const NO_WA="628XXXXXXXXXX"; // GANTI NOMOR KAMU

let produk=[];
let cart=JSON.parse(localStorage.getItem("cart")||"{}");
let kategoriAktif="All";

fetch(API_URL)
.then(res=>res.json())
.then(data=>{
  produk=data;
  buatKategori();
  tampilkan();
  hitung();
});

function buatKategori(){
  let unik=["All"];
  produk.forEach(p=>{
    if(!unik.includes(p.kategori)) unik.push(p.kategori);
  });

  let html="";
  unik.forEach(k=>{
    html+=`<button onclick="setKategori('${k}')">${k}</button>`;
  });

  document.getElementById("kategori").innerHTML=html;
}

function setKategori(k){
  kategoriAktif=k;
  tampilkan();
}

function tampilkan(){
  let html="";
  produk
  .filter(p=>kategoriAktif==="All" || p.kategori===kategoriAktif)
  .forEach(p=>{
    html+=`
    <div class="produk">
      <b>${p.nama}</b><br>
      Rp ${p.harga}<br>
      <small>${p.kategori}</small><br><br>
      <button class="btn-cart" onclick="tambah('${p.id}')">+ Keranjang</button>
    </div>
    `;
  });

  document.getElementById("produkList").innerHTML=html;
}

function tambah(id){
  if(!cart[id]) cart[id]=0;
  cart[id]++;
  simpan();
}

function simpan(){
  localStorage.setItem("cart",JSON.stringify(cart));
  hitung();
}

function hitung(){
  let total=0;

  produk.forEach(p=>{
    if(cart[p.id]){
      total+=cart[p.id]*p.harga;
    }
  });

  document.getElementById("total").innerText=total;
}

function checkout(){
  let text="Halo, saya mau order:%0A";

  produk.forEach(p=>{
    if(cart[p.id]){
      text+=`${p.nama} x${cart[p.id]}%0A`;
    }
  });

  text+="%0ATerima kasih";

  window.open(`https://wa.me/${NO_WA}?text=${text}`);
}
</script>

</body>
</html>
