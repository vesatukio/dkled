<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DK LED PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f5f5;}
.header{background:#ff6a00;color:white;padding:12px;font-weight:600;text-align:center;}
.search{padding:8px;background:white;}
.search input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;}
.kategori{display:flex;overflow:auto;background:white;padding:8px;gap:8px;}
.kategori button{border:none;background:#eee;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
.kategori button.active{background:#ff6a00;color:white;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;}
.card{background:white;border-radius:8px;padding:10px;font-size:13px;}
.nama{font-weight:500;}
.harga{color:#ff6a00;font-weight:600;margin-top:4px;}
.termurah{background:#4caf50;color:white;padding:2px 6px;border-radius:6px;font-size:10px;margin-left:6px;}
.btn{margin-top:6px;padding:6px;border:none;border-radius:6px;width:100%;cursor:pointer;}
.stok{background:#ddd;}
.stok.aktif{background:#4caf50;color:white;}
.diskon{background:#ff6a00;color:white;}
.wa{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:14px;border-radius:50px;cursor:pointer;}
</style>
</head>
<body>

<div class="header">DK LED PRO</div>

<div class="search">
  <input type="text" placeholder="Cari produk..." onkeyup="cari(this.value)">
</div>

<div class="kategori" id="kategori"></div>

<div class="grid" id="produk"></div>

<div class="wa" onclick="exportWA()">Order WA</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyAt3",
  authDomain:"katalog-lampu.firebaseapp.com",
  databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com",
  projectId:"katalog-lampu"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let semuaProduk=[];
let kategoriAktif="";
let cart={};

function rupiah(a){return "Rp. "+Number(a).toLocaleString("id-ID");}

function load(){
  db.ref("produk").on("value",snap=>{
    semuaProduk=[];
    snap.forEach(c=>{
      let p=c.val(); p.id=c.key;
      semuaProduk.push(p);
    });
    render();
  });

  db.ref("kategori").on("value",snap=>{
    let html='<button onclick="setKategori(\'\')">Semua</button>';
    snap.forEach(c=>{
      let k=c.val();
      html+=`<button onclick="setKategori('${k.nama}')">${k.nama}</button>`;
    });
    document.getElementById("kategori").innerHTML=html;
  });
}

function hitungHarga(p){
  let h=p.harga||0;
  if(p.diskon1) h-=h*p.diskon1/100;
  if(p.diskon2) h-=h*p.diskon2/100;
  if(p.diskon3) h-=h*p.diskon3/100;
  return Math.round(h);
}

function setKategori(k){kategoriAktif=k; render();}

function cari(k){render(k);}

function render(keyword=""){
  let html="";

  // cari termurah per kategori
  let minHarga={};
  semuaProduk.forEach(p=>{
    let h=hitungHarga(p);
    if(!minHarga[p.kategori] || h<minHarga[p.kategori]){
      minHarga[p.kategori]=h;
    }
  });

  semuaProduk
  .filter(p=>!kategoriAktif || p.kategori==kategoriAktif)
  .filter(p=>!keyword || p.nama.toLowerCase().includes(keyword.toLowerCase()))
  .sort((a,b)=>hitungHarga(a)-hitungHarga(b))
  .forEach(p=>{

    let harga=hitungHarga(p);
    let termurah = harga==minHarga[p.kategori];
    let stokAda = p.stok!=0;

    html+=`<div class="card">
      <div class="nama">
        ${p.nama}
        ${termurah?'<span class="termurah">TERMURAH</span>':''}
      </div>
      <div class="harga">${rupiah(harga)}</div>

      <button class="btn stok ${stokAda?'aktif':''}" onclick="toggleStok('${p.id}',${stokAda})">
        ${stokAda?'ADA':'HABIS'}
      </button>

      <button class="btn diskon" onclick="setDiskon('${p.id}')">Diskon</button>

      <button class="btn" onclick="tambahCart('${p.id}')">Pilih</button>
    </div>`;
  });

  document.getElementById("produk").innerHTML=html;
}

function toggleStok(id,s){db.ref("produk/"+id).update({stok:s?0:1});}

function setDiskon(id){
  let d1=prompt("Diskon 1");
  let d2=prompt("Diskon 2");
  let d3=prompt("Diskon 3");
  db.ref("produk/"+id).update({
    diskon1:Number(d1)||0,
    diskon2:Number(d2)||0,
    diskon3:Number(d3)||0
  });
}

function tambahCart(id){
  cart[id]=true;
  alert("Ditambahkan");
}

function exportWA(){
  let teks="Order:%0A";
  semuaProduk.forEach(p=>{
    if(cart[p.id]){
      teks+=p.nama+" - "+rupiah(hitungHarga(p))+"%0A";
    }
  });
  window.open("https://wa.me/6288224166270?text="+teks);
}

load();
</script>

</body>
</html>
