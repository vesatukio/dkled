<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DK Lampu</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
background:#ff6a00;
color:white;
padding:14px;
font-size:18px;
text-align:center;
font-weight:bold;
}

.search{
padding:10px;
background:white;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
}

.nama{
font-size:14px;
margin-bottom:5px;
}

.harga{
color:#ff6a00;
font-weight:bold;
margin-bottom:8px;
}

/* QTY */

.qty{
display:flex;
align-items:center;
justify-content:space-between;
}

.qty button{
width:32px;
height:32px;
border:none;
background:#ff6a00;
color:white;
font-size:18px;
border-radius:6px;
}

/* TOTAL */

.total{
background:white;
padding:12px;
font-size:18px;
font-weight:bold;
}

/* WA FLOAT */

.wa{
position:fixed;
right:15px;
bottom:90px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:30px;
font-weight:bold;
}

/* MENU BAWAH */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
border-top:1px solid #ddd;
}

.bottom button{
flex:1;
padding:14px;
border:none;
background:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
DK Lampu
</div>

<div class="search">
<input type="text" id="cari" placeholder="Cari produk..." onkeyup="cariProduk()">
</div>

<div class="grid" id="produk"></div>

<div class="total">
Total : Rp <span id="total">0</span>
</div>

<div class="wa" onclick="kirimWA()">
Order WA
</div>

<div class="bottom">
<button onclick="resetCart()">Reset</button>
<button onclick="lihatKeranjang()">Keranjang</button>
<button onclick="menuAkun()">Akun</button>
</div>

<script>

let produk = JSON.parse(localStorage.getItem("produk")) || [
{nama:"Lampu LED 5W",harga:5000},
{nama:"Lampu LED 10W",harga:7000},
{nama:"Lampu LED 15W",harga:9000},
{nama:"Lampu LED 20W",harga:12000},
{nama:"Driver LED 18W",harga:6000},
{nama:"Driver LED 24W",harga:8000}
]

let cart = JSON.parse(localStorage.getItem("cart")) || {}

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

let qty = cart[i] || 0

html+=`

<div class="card">

<div class="nama">${p.nama}</div>

<div class="harga">Rp ${p.harga}</div>

<div class="qty">

<button onclick="kurang(${i})">-</button>

<div>${qty}</div>

<button onclick="tambah(${i})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

hitungTotal()

}

function tambah(i){

cart[i]=(cart[i]||0)+1

simpan()

}

function kurang(i){

if(cart[i]){
cart[i]--
if(cart[i]==0) delete cart[i]
}

simpan()

}

function simpan(){

localStorage.setItem("cart",JSON.stringify(cart))
localStorage.setItem("produk",JSON.stringify(produk))

tampilProduk()

}

function hitungTotal(){

let total=0

for(let i in cart){

total+=produk[i].harga*cart[i]

}

document.getElementById("total").innerText=total

}

/* PENCARIAN */

function cariProduk(){

let k=document.getElementById("cari").value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(k) ? "block":"none"

})

}

/* WHATSAPP */

function kirimWA(){

let text="Order DK Lampu:%0A"

for(let i in cart){

text+=produk[i].nama+" x"+cart[i]+"%0A"

}

text+="Total: Rp "+document.getElementById("total").innerText

window.open("https://wa.me/6288224166270?text="+text)

}

/* RESET */

function resetCart(){

cart={}

simpan()

}

/* KERANJANG */

function lihatKeranjang(){

let text="Keranjang:%0A"

for(let i in cart){

text+=produk[i].nama+" x"+cart[i]+"\n"

}

alert(text)

}

/* MENU AKUN */

function menuAkun(){

let pilih = prompt(

"1 Tambah Produk\n2 Hapus Produk"

)

if(pilih==1){

let nama=prompt("Nama produk")

let harga=prompt("Harga")

produk.push({nama:nama,harga:Number(harga)})

}

if(pilih==2){

let no=prompt("Nomor produk")

produk.splice(no-1,1)

}

simpan()

}

tampilProduk()

</script>

</body>
</html>
