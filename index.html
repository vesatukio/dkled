<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duta Terang LED</title>

<link rel="icon" href="icon-192.png">

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:12px;text-align:center}

#search{
width:95%;
margin:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc
}

#produk{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1)
}

.harga{
color:#e53935;
font-weight:bold;
font-size:16px
}

.coret{
text-decoration:line-through;
color:#888;
font-size:12px
}

button{
background:#25D366;
color:white;
border:none;
padding:8px;
width:100%;
border-radius:6px;
margin-top:5px
}
</style>
</head>

<body>

<header>
<h2>Duta Terang LED</h2>
</header>

<input type="text" id="search" placeholder="Cari produk...">

<div id="produk">Loading...</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyvF-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";
const noWA = "62XXXXXXXXXX"; // GANTI NOMOR KAMU

let semua = [];

fetch(apiURL)
.then(res => res.json())
.then(data => {

  let rows = data.data || data;

  rows.forEach(r => {
    semua.push({
      nama: r.nama,
      harga: parseInt(r.harga),
      d1: r["diskon 1"],
      d2: r["diskon 2"],
      d3: r["diskon3"],
      kategori: r.kategori
    });
  });

  tampil(semua);
});

function tampil(data){
 let html="";

 data.forEach(p=>{

 let diskonHTML = "";

 if(p.d1) diskonHTML += `<div>💸 1 pcs: Rp ${Number(p.d1).toLocaleString()}</div>`;
 if(p.d2) diskonHTML += `<div>📦 10 pcs: Rp ${Number(p.d2).toLocaleString()}</div>`;
 if(p.d3) diskonHTML += `<div>🏷️ Grosir: Rp ${Number(p.d3).toLocaleString()}</div>`;

 html+=`
 <div class="card">
  <h4>${p.nama}</h4>

  <div class="coret">Rp ${p.harga.toLocaleString()}</div>
  <div class="harga">
    Rp ${p.d1 ? Number(p.d1).toLocaleString() : p.harga.toLocaleString()}
  </div>

  ${diskonHTML}

  <a href="https://wa.me/${noWA}?text=Halo, saya mau order:
${p.nama}" target="_blank">
   <button>Beli</button>
  </a>
 </div>
 `;
 });

 document.getElementById("produk").innerHTML=html;
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
 let val=e.target.value.toLowerCase();
 tampil(semua.filter(p=>p.nama.toLowerCase().includes(val)));
});
</script>

</body>
</html>
