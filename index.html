<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DK LED</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f5f5;}
.header{background:#ff6a00;color:white;padding:12px;text-align:center;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;}
.card{background:white;border-radius:8px;padding:10px;font-size:13px;}
.nama{font-weight:500;}
.harga{color:#ff6a00;font-weight:600;margin-top:4px;}
.info{font-size:11px;color:#666;margin-top:4px;line-height:1.4;}
.qty{display:flex;justify-content:space-between;margin-top:8px;}
.qty button{width:30px;height:30px;background:#ff6a00;color:white;border:none;border-radius:6px;}
.qty input{width:40px;text-align:center;}
.stok{margin-top:6px;padding:6px;border:none;border-radius:6px;width:100%;}
.stok.ada{background:#4caf50;color:white;}
.stok.habis{background:#ccc;}
.total{position:fixed;bottom:70px;left:10px;background:white;padding:10px;border-radius:8px;}
.wa{position:fixed;bottom:70px;right:10px;background:#25D366;color:white;padding:12px;border-radius:30px;}
.bottom{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:white;padding:10px;}
.bottom button{background:#ff6a00;color:white;border:none;padding:10px;border-radius:8px;}
</style>
</head>
<body>

<div class="header">DK LED</div>
<div class="grid" id="produk"></div>
<div class="total" id="total">Total: 0</div>
<div class="wa" onclick="orderWA()">Order WA</div>
<div class="bottom">
<button onclick="resetCart()">Reset</button>
<button onclick="lihatKeranjang()">Keranjang (<span id="jmlcart">0</span>)</button>
<button onclick="login()">Admin</button>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyAt3",databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let cart=JSON.parse(localStorage.getItem("cart")||"{}");
let semuaProduk=[];

function simpan(){localStorage.setItem("cart",JSON.stringify(cart));}
function rupiah(a){return "Rp."+Number(a).toLocaleString("id-ID");}

function load(){
 db.ref("produk").on("value",s=>{
  semuaProduk=[];
  s.forEach(c=>{let p=c.val();p.id=c.key;semuaProduk.push(p)});
  render();
 });
}

function getHarga(p,qty){
 let harga=p.harga||0;
 if(qty>=p.qty3) harga=harga-(harga*p.diskon3/100);
 else if(qty>=p.qty2) harga=harga-(harga*p.diskon2/100);
 else if(qty>=p.qty1) harga=harga-(harga*p.diskon1/100);
 return Math.round(harga);
}

function infoDiskon(p){
 let teks=[];
 if(p.qty1 && p.diskon1) teks.push(`≥ ${p.qty1} pcs → ${p.diskon1}%`);
 if(p.qty2 && p.diskon2) teks.push(`≥ ${p.qty2} pcs → ${p.diskon2}%`);
 if(p.qty3 && p.diskon3) teks.push(`≥ ${p.qty3} pcs → ${p.diskon3}%`);
 return teks.join('<br>');
}

function render(){
 let html="";
 semuaProduk.forEach(p=>{
  let q=cart[p.id]||0;
  let harga=getHarga(p,q);
  let stok=p.stok!=0;

  html+=`<div class="card">
  <div class="nama">${p.nama}</div>
  <div class="harga">${rupiah(harga)}</div>

  <div class="info">${infoDiskon(p)}</div>

  <div class="qty">
   <button onclick="min('${p.id}')">-</button>
   <input value="${q}" onchange="setQty('${p.id}',this.value)">
   <button onclick="plus('${p.id}')">+</button>
  </div>

  <button class="stok ${stok?'ada':'habis'}" onclick="toggle('${p.id}',${stok})">
  ${stok?'ADA':'HABIS'}
  </button>

  </div>`;
 });
 document.getElementById("produk").innerHTML=html;
 total();
}

function plus(id){cart[id]=(cart[id]||0)+1;simpan();render();}
function min(id){cart[id]=(cart[id]||0)-1;if(cart[id]<=0) delete cart[id];simpan();render();}
function setQty(id,v){v=Number(v);if(v<=0) delete cart[id];else cart[id]=v;simpan();render();}

function toggle(id,s){db.ref("produk/"+id).update({stok:s?0:1});}

function total(){
 let t=0,jml=0;
 semuaProduk.forEach(p=>{
  let q=cart[p.id]||0;
  t+=getHarga(p,q)*q;
  jml+=q;
 });
 document.getElementById("total").innerText="Total: "+rupiah(t);
 document.getElementById("jmlcart").innerText=jml;
});
 document.getElementById("total").innerText="Total: "+rupiah(t);
 document.getElementById("jmlcart").innerText=jml;
});
 document.getElementById("total").innerText="Total: "+rupiah(t);
}

function orderWA(){
 let teks="Order:%0A";
 semuaProduk.forEach(p=>{
  let q=cart[p.id]||0;
  if(q>0) teks+=`${p.nama} x${q}%0A`;
 });
 window.open("https://wa.me/6288224166270?text="+teks);
}

function resetCart(){cart={};simpan();render();}

function lihatKeranjang(){
 let teks="Keranjang:\n";
 semuaProduk.forEach(p=>{
  let q=cart[p.id]||0;
  if(q>0) teks+=p.nama+" x"+q+"\n";
 });
 alert(teks);
}

function lihatKeranjang(){
 let teks="Keranjang:
";
 semuaProduk.forEach(p=>{
  let q=cart[p.id]||0;
  if(q>0) teks+=p.nama+" x"+q+"
";
 });
 alert(teks);
}

function login(){
 let pass=prompt("Password");
 if(pass=="dklampu"){
  alert("Edit diskon di Firebase: qty1,2,3 + diskon1,2,3");
 }
}

load();
</script>

</body>
</html>
