<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin DK LED</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

h2{
  text-align:center;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.row{
  display:flex;
  gap:6px;
}

.row input{
  flex:1;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff6a00;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-small{
  width:auto;
  padding:6px 10px;
  margin-top:6px;
}

.btn-edit{background:#2196f3}
.btn-hapus{background:#e53935}
</style>
</head>

<body>
<div class="container">

<h2>Admin Produk</h2>

<div class="card">
<input id="nama" placeholder="Nama produk">
<input id="harga" placeholder="Harga">

<div class="row">
<input id="qty1" placeholder="Qty 1">
<input id="diskon1" placeholder="Diskon %">
</div>

<div class="row">
<input id="qty2" placeholder="Qty 2">
<input id="diskon2" placeholder="Diskon %">
</div>

<div class="row">
<input id="qty3" placeholder="Qty 3">
<input id="diskon3" placeholder="Diskon %">
</div>

<button onclick="simpan()">Simpan Produk</button>
</div>

<div id="list"></div>

</div>

<script>
const firebaseConfig={
 apiKey:"AIzaSyAt3",
 databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let editId=null;

function simpan(){
 let data={
  nama:nama.value,
  harga:Number(harga.value),
  qty1:Number(qty1.value),
  diskon1:Number(diskon1.value),
  qty2:Number(qty2.value),
  diskon2:Number(diskon2.value),
  qty3:Number(qty3.value),
  diskon3:Number(diskon3.value),
  stok:1
 };

 if(editId){
  db.ref("produk/"+editId).update(data);
  editId=null;
 }else{
  db.ref("produk").push(data);
 }
 kosong();
}

function kosong(){
 document.querySelectorAll("input").forEach(i=>i.value="");
}

function load(){
 db.ref("produk").on("value",snap=>{
  let html="";

  snap.forEach(c=>{
    let p=c.val();
    let id=c.key;

    html+=`<div class="card">
    <b>${p.nama}</b><br>
    Harga: Rp ${p.harga}<br>
    <small>Diskon: ${p.qty1}/${p.diskon1}% | ${p.qty2}/${p.diskon2}% | ${p.qty3}/${p.diskon3}%</small><br>
    <button class="btn-small btn-edit" onclick="edit('${id}')">Edit</button>
    <button class="btn-small btn-hapus" onclick="hapus('${id}')">Hapus</button>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
 });
}

function edit(id){
 db.ref("produk/"+id).once("value").then(s=>{
  let p=s.val();
  nama.value=p.nama;
  harga.value=p.harga;
  qty1.value=p.qty1;
  diskon1.value=p.diskon1;
  qty2.value=p.qty2;
  diskon2.value=p.diskon2;
  qty3.value=p.qty3;
  diskon3.value=p.diskon3;
  editId=id;
 });
}

function hapus(id){
 if(confirm("Hapus produk?")) db.ref("produk/"+id).remove();
}

load();
</script>

</body>
</html>
