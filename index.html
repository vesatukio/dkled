<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duta Terang LED</title>

<style>
body{font-family:sans-serif;margin:0;background:#f9f9f9;padding-bottom:80px}
header{background:#00bcd4;color:#fff;padding:12px;text-align:center;font-size:1.2em;font-weight:bold}

/* Kategori */
#kategori{display:flex;flex-wrap:wrap;gap:5px;padding:10px}
#kategori button{
  background:#e0f7fa;border:none;border-radius:20px;
  padding:6px 12px;font-size:0.85em;cursor:pointer
}
#kategori button:hover{background:#00e5ff;color:#000}

/* Produk */
#produk{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;padding:10px
}
.card{
  background:#fff;border-radius:10px;padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  display:flex;flex-direction:column;gap:5px
}
.card h4{margin:0;font-size:0.95em}

.harga{color:#e91e63;font-weight:bold}

.qty{display:flex;gap:5px}
.qty button{
  width:30px;background:#ddd;border:none;border-radius:5px
}
.qty input{
  width:40px;text-align:center;border-radius:5px;border:1px solid #ccc
}

/* Label */
.termurah{background:#d4edda;color:#155724;padding:2px 6px;border-radius:5px;font-size:10px}
.mahal{background:#f8d7da;color:#721c24;padding:2px 6px;border-radius:5px;font-size:10px}
.rekomendasi{
  background:#fff3cd;color:#856404;
  padding:5px;border-radius:6px;font-size:11px
}
.selisih{font-size:11px;color:#666}

/* Floating */
#floatingTotal{
  position:fixed;bottom:70px;right:10px;
  background:#fff;padding:6px 12px;border-radius:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
  font-weight:bold;z-index:2
}

/* Footer */
.footer{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;display:flex;justify-content:space-around;
  padding:5px 0;box-shadow:0 -2px 5px rgba(0,0,0,.1)
}
.footer button{
  width:50px;height:50px;border-radius:50%;
  border:none;color:#fff;font-size:18px
}
.keranjang{background:#4caf50}
.reset{background:#f44336}
.admin{background:#555}

.admin-panel{
  display:none;padding:10px;background:#fff3cd;
  margin:10px;border-radius:10px
}
</style>
</head>

<body>

<header>Duta Terang LED</header>

<div id="kategori"></div>
<div id="produk"></div>

<div id="adminPanel" class="admin-panel">
  <h4>Admin Panel</h4>
  <div id="adminContent"></div>
</div>

<div id="floatingTotal">0 Barang | Rp 0</div>

<div class="footer">
  <button class="keranjang" onclick="checkout()">🛒</button>
  <button class="reset" onclick="resetCart()">🔄</button>
  <button class="admin" onclick="loginAdmin()">⚙️</button>
</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyvF-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";
const noWA = "6288224166270";

let produkList = [];
let cart = JSON.parse(localStorage.getItem("cart")||"{}");

fetch(apiURL)
.then(res=>res.json())
.then(data=>{
 let rows = data.data || data;
 rows.forEach((r,i)=>{
  produkList.push({
    id:i,
    nama:r.nama,
    harga:+r.harga,
    diskon1:+r.diskon1||0,
    diskon2:+r.diskon2||0,
    diskon3:+r.diskon3||0,
    kategori:r.kategori
  });
 });
 tampilKategori();
 tampil();
});

function hitungHarga(p, qty){
 if(qty>=100 && p.diskon3) return p.harga*(1-p.diskon3/100);
 if(qty>=50 && p.diskon2) return p.harga*(1-p.diskon2/100);
 if(qty>=10 && p.diskon1) return p.harga*(1-p.diskon1/100);
 return p.harga;
}

function getWatt(nama){
 let m = nama.match(/(\d+)\s*w/i);
 return m ? +m[1] : 0;
}

function tampil(){
 let html="";
 let grup={};

 produkList.forEach(p=>{
  let w=getWatt(p.nama);
  if(!grup[w]) grup[w]=[];
  grup[w].push(p);
 });

 Object.keys(grup).sort((a,b)=>a-b).forEach(w=>{
  let data=grup[w];
  let min=Math.min(...data.map(p=>p.harga));
  let max=Math.max(...data.map(p=>p.harga));

  html+=`<h3 style="padding:10px">${w} Watt</h3>`;

  data.sort((a,b)=>a.harga-b.harga);

  data.forEach((p,i)=>{
   let qty=cart[p.id]||0;
   let harga=Math.round(hitungHarga(p,qty));

   let label="";
   if(p.harga==min) label=`<span class="termurah">TERMURAH</span>`;
   else if(p.harga==max) label=`<span class="mahal">TERMAHAL</span>`;

   let rekom="";
   let next=data[i+1];
   if(next && (next.harga-p.harga)<=1000){
    rekom=`<div class="rekomendasi">🔥 Selisih Rp ${(next.harga-p.harga).toLocaleString()} upgrade ke ${next.nama}</div>`;
   }

   html+=`
   <div class="card">
     <h4>${p.nama} ${label}</h4>
     <small>Rp ${p.harga.toLocaleString()}</small>
     <div class="harga">Rp ${harga.toLocaleString()}</div>
     ${rekom}
     <div class="qty">
       <button onclick="ubah(${p.id},-1)">-</button>
       <input value="${qty}" onchange="manual(${p.id},this.value)">
       <button onclick="ubah(${p.id},1)">+</button>
     </div>
   </div>`;
  });
 });

 document.getElementById("produk").innerHTML=html;
 hitungTotal();
}

function tampilKategori(){
 let unik=[...new Set(produkList.map(p=>p.kategori))];
 let html=`<button onclick="tampil()">Semua</button>`;
 unik.forEach(k=>html+=`<button onclick="filter('${k}')">${k}</button>`);
 document.getElementById("kategori").innerHTML=html;
}

function filter(k){
 let data=produkList.filter(p=>p.kategori==k);
 let html="";
 data.forEach(p=>{
  let qty=cart[p.id]||0;
  let harga=Math.round(hitungHarga(p,qty));

  html+=`
  <div class="card">
    <h4>${p.nama}</h4>
    <div class="harga">Rp ${harga.toLocaleString()}</div>
    <div class="qty">
      <button onclick="ubah(${p.id},-1)">-</button>
      <input value="${qty}" onchange="manual(${p.id},this.value)">
      <button onclick="ubah(${p.id},1)">+</button>
    </div>
  </div>`;
 });

 document.getElementById("produk").innerHTML=html;
}

function ubah(id,val){
 cart[id]=(cart[id]||0)+val;
 if(cart[id]<0) cart[id]=0;
 simpan();
}

function manual(id,val){
 cart[id]=parseInt(val)||0;
 simpan();
}

function simpan(){
 localStorage.setItem("cart",JSON.stringify(cart));
 tampil();
}

function hitungTotal(){
 let total=0,count=0;
 produkList.forEach(p=>{
  let q=cart[p.id]||0;
  total+=q*hitungHarga(p,q);
  count+=q;
 });
 document.getElementById("floatingTotal").innerText=
 `${count} Barang | Rp ${Math.round(total).toLocaleString()}`;
}

function resetCart(){
 cart={};
 simpan();
}

function checkout(){
 let text="Halo, saya mau order:\n\n";
 produkList.forEach(p=>{
  let q=cart[p.id];
  if(q>0) text+=`${p.nama} x${q}\n`;
 });
 window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(text)}`);
}

function loginAdmin(){
 let pass=prompt("Password:");
 if(pass==="12345"){
  document.getElementById("adminPanel").style.display="block";
 }
}
</script>

</body>
</html>
