<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DK LED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
background:#ff6a00;
color:white;
padding:10px;
font-weight:600;
}

.kategori{
display:flex;
overflow:auto;
background:white;
padding:8px;
gap:8px;
}

.kategori button{
border:none;
background:#eee;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:8px;

}

.card{

background:white;
border-radius:8px;
padding:8px;
position:relative;
font-size:13px;

}

.nama{
font-weight:500;
}

.harga{
color:#ff6a00;
font-weight:600;
}

.diskon{

position:absolute;
top:0;
right:0;
background:red;
color:white;
font-size:11px;
padding:4px 6px;
border-bottom-left-radius:6px;

}

.qty{

display:flex;
gap:6px;
margin-top:6px;

}

.qty button{
width:24px;
height:24px;
border:none;
background:#ff6a00;
color:white;
border-radius:4px;
}

.wa{

position:fixed;
bottom:70px;
right:10px;
background:#25D366;
color:white;
padding:10px;
border-radius:30px;
font-size:14px;

}

.total{

position:fixed;
bottom:70px;
left:10px;
background:white;
padding:8px;
border-radius:6px;
font-size:14px;

}

.bottom{

position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;

}

</style>

</head>

<body>

<div class="header">
DK LED
</div>

<div class="kategori" id="kategori"></div>

<div class="grid" id="produk"></div>

<div class="total" id="total">Total: 0</div>

<div class="wa" onclick="orderWA()">
Order WA
</div>

<div class="bottom">

<button onclick="resetCart()">Reset</button>
<button onclick="lihatKeranjang()">Keranjang</button>
<button onclick="login()">Admin</button>

</div>

<script>

const firebaseConfig={

apiKey:"AIzaSyAt3",
authDomain:"katalog-lampu.firebaseapp.com",
databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com",
projectId:"katalog-lampu"

}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

let cart=JSON.parse(localStorage.getItem("cart")||"{}")

function simpanCart(){

localStorage.setItem("cart",JSON.stringify(cart))

}

function tampilProduk(kat=""){

db.ref("produk").on("value",snap=>{

let html=""

snap.forEach(child=>{

let p=child.val()
let id=child.key

if(kat && p.kategori!=kat) return

let harga=p.harga

if(p.diskon_nominal)
harga=harga-p.diskon_nominal

if(p.diskon_persen)
harga=harga-(p.harga*p.diskon_persen/100)

let teksDiskon=""

if(p.diskon_nominal)
teksDiskon="-Rp"+p.diskon_nominal

if(p.diskon_persen)
teksDiskon="-"+p.diskon_persen+"%"

html+=`

<div class="card">

${teksDiskon?`<div class="diskon">${teksDiskon}</div>`:""}

<div class="nama">${p.nama}</div>

<div class="harga">Rp${harga}</div>

<div class="qty">

<button onclick="min('${id}')">-</button>

<span>${cart[id]||0}</span>

<button onclick="plus('${id}')">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

hitungTotal()

})

}

function plus(id){

cart[id]=(cart[id]||0)+1
simpanCart()
tampilProduk()

}

function min(id){

cart[id]=(cart[id]||0)-1

if(cart[id]<=0) delete cart[id]

simpanCart()
tampilProduk()

}

function hitungTotal(){

db.ref("produk").once("value").then(snap=>{

let total=0

snap.forEach(child=>{

let p=child.val()
let id=child.key

let q=cart[id]||0

let harga=p.harga

if(p.diskon_nominal)
harga-=p.diskon_nominal

if(p.diskon_persen)
harga-=p.harga*p.diskon_persen/100

total+=harga*q

})

document.getElementById("total").innerText="Total: Rp"+total

})

}

function orderWA(){

let teks="Order:%0A"

db.ref("produk").once("value").then(snap=>{

snap.forEach(child=>{

let p=child.val()
let id=child.key

if(cart[id]){

teks+=p.nama+" x"+cart[id]+"%0A"

}

})

window.open("https://wa.me/6288224166270?text="+teks)

})

}

function resetCart(){

cart={}
simpanCart()
tampilProduk()

}

function login(){

let pass=prompt("Password admin")

if(pass=="dklampu"){

location.href="admin.html"

}else{

alert("Password salah")

}

}

function loadKategori(){

db.ref("kategori").on("value",snap=>{

let html=`<button onclick="tampilProduk()">Semua</button>`

snap.forEach(child=>{

let k=child.val()

html+=`<button onclick="tampilProduk('${k.nama}')">${k.nama}</button>`

})

document.getElementById("kategori").innerHTML=html

})

}

loadKategori()
tampilProduk()

</script>

</body>

</html>
