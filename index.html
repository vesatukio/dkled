<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duta Terang LED</title>

<style>
*{box-sizing:border-box;}
body{
  font-family:sans-serif;
  margin:0;
  background:#f9f9f9;
  padding-bottom:90px;
}
header{
  background:#00bcd4;
  color:#fff;
  padding:12px;
  text-align:center;
  font-size:1.2em;
  font-weight:bold;
}

#search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

#kategori{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:10px;
}

#kategori button{
  background:#e0f7fa;
  border:none;
  border-radius:20px;
  padding:6px 12px;
  font-size:0.85em;
  cursor:pointer;
}

#produk{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  display:flex;
  flex-direction:column;
  gap:6px;
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

.card h4{margin:0;font-size:0.85em;}

.harga{color:#e91e63;font-weight:bold;}

.qty{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:5px;
}

.qty button{
  width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;
}

.qty input{
  width:40px;text-align:center;border:1px solid #ccc;border-radius:6px;
}

#floatingTotal{
  position:fixed;
  bottom:70px;
  right:10px;
  background:#fff;
  padding:6px 12px;
  border-radius:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
  font-weight:bold;
  font-size:12px;
}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:6px 0;
  box-shadow:0 -2px 5px rgba(0,0,0,.1);
}

.footer button{
  width:45px;height:45px;border-radius:50%;border:none;color:#fff;
}

.keranjang{background:#4caf50}
.reset{background:#f44336}

/* MODAL */
#modalCheckout{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:9999;
}

.modal-box{
  background:#fff;
  width:90%;
  max-width:400px;
  margin:80px auto;
  padding:15px;
  border-radius:12px;
  max-height:70vh;
  overflow:auto;
}

.item-order{
  display:flex;
  justify-content:space-between;
  padding:5px 0;
  border-bottom:1px solid #eee;
}
</style>
</head>
<body>

<header>Duta Terang LED</header>

<div style="padding:10px">
<input id="search" placeholder="Cari produk..." oninput="cari(this.value)">
</div>

<div id="kategori"></div>
<div id="produk"></div>

<div id="floatingTotal">0 Barang | Rp 0</div>

<div class="footer">
<button class="keranjang" onclick="focusSearch()">🔍</button>
<button class="keranjang" onclick="checkout()">🛒</button>
<button class="reset" onclick="resetCart()">🔄</button>
</div>

<!-- MODAL CHECKOUT -->
<div id="modalCheckout">
  <div class="modal-box">
    <h3>Ringkasan Order</h3>
    <div id="isiOrder"></div>
    <div id="totalOrder" style="margin-top:10px;font-weight:bold"></div>

    <div style="display:flex;gap:10px;margin-top:15px">
      <button onclick="kirimWA()" style="flex:1;padding:10px;background:#4caf50;color:#fff;border:none;border-radius:8px">Kirim WA</button>
      <button onclick="tutupModal()" style="flex:1;padding:10px;background:#f44336;color:#fff;border:none;border-radius:8px">Batal</button>
    </div>
  </div>
</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyfV-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";
const noWA = "6288224166270";

let produkList = [];
let currentData = [];
let cart = JSON.parse(localStorage.getItem("cart") || "{}");

let tempText = "";
let tempTotal = 0;

fetch(apiURL)
.then(r=>r.json())
.then(d=>{
  let rows = d.data || d;

  rows.forEach((r,i)=>{
    produkList.push({
      id:i,
      nama:r.nama,
      harga:Number(r.harga),
      kategori:(r.kategori||"").toUpperCase(),
      gambar:r.gambar||"https://i.imgur.com/rx12w.webp"
    });
  });

  buatKategori();
  currentData = produkList;
  tampil(currentData);
});

function buatKategori(){
  let set=new Set();
  produkList.forEach(p=>{if(p.kategori) set.add(p.kategori)});

  let html=`<button onclick="filterAll()">SEMUA</button>`;
  set.forEach(k=>{
    html+=`<button onclick="filterKategori('${k}')">${k}</button>`;
  });
  document.getElementById("kategori").innerHTML=html;
}

function filterAll(){currentData=produkList;tampil(currentData);}
function filterKategori(k){currentData=produkList.filter(p=>p.kategori===k);tampil(currentData);}

function cari(t){
  t=t.toLowerCase();
  currentData=produkList.filter(p=>p.nama.toLowerCase().includes(t));
  tampil(currentData);
}

function tampil(data){
  let html="";

  data.forEach(p=>{
    let q=cart[p.id]||0;

    html+=`
    <div class="card">
      <img src="${p.gambar}">
      <h4>${p.nama}</h4>
      <div class="harga">Rp ${p.harga.toLocaleString()}</div>
      <div class="qty">
        <button onclick="ubah(${p.id},-1)">-</button>
        <input value="${q}" onchange="manual(${p.id},this.value)">
        <button onclick="ubah(${p.id},1)">+</button>
      </div>
    </div>`;
  });

  document.getElementById("produk").innerHTML=html;
  hitungTotal();
}

function ubah(id,v){
  cart[id]=(cart[id]||0)+v;
  if(cart[id]<0) cart[id]=0;
  simpan();
}

function manual(id,v){
  cart[id]=parseInt(v)||0;
  simpan();
}

function simpan(){
  localStorage.setItem("cart",JSON.stringify(cart));
  tampil(currentData);
}

function hitungTotal(){
  let total=0,count=0;

  produkList.forEach(p=>{
    let q=cart[p.id]||0;
    total+=q*p.harga;
    count+=q;
  });

  document.getElementById("floatingTotal").innerText=`${count} Barang | Rp ${total.toLocaleString()}`;
}

function resetCart(){cart={};simpan();}

function checkout(){
  let html="";
  let total=0;
  let ada=false;
  let text="Pesanan:\n\n";

  produkList.forEach(p=>{
    let q=cart[p.id]||0;
    if(q>0){
      ada=true;
      html+=`<div class='item-order'>${p.nama} x ${q}<span>Rp ${(p.harga*q).toLocaleString()}</span></div>`;
      text+=`${p.nama} x ${q}\n`;
      total+=p.harga*q;
    }
  });

  if(!ada){alert("Keranjang kosong");return;}

  tempText=text;
  tempTotal=total;

  document.getElementById("isiOrder").innerHTML=html;
  document.getElementById("totalOrder").innerText="Total: Rp "+total.toLocaleString();
  document.getElementById("modalCheckout").style.display="block";
}

function kirimWA(){
  let finalText=tempText+"\nTotal: Rp "+tempTotal.toLocaleString();
  window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(finalText)}`);
  tutupModal();
}

function tutupModal(){
  document.getElementById("modalCheckout").style.display="none";
}

function focusSearch(){
  document.getElementById("search").focus();
}
</script>

</body>
</html>
