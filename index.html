<!DOCTYPE html>
<html lang="id">
  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duta Terang LED</title>

<style>
body{font-family:sans-serif;margin:0;background:#f9f9f9;padding-bottom:80px}
header{background:#00bcd4;color:#fff;padding:12px;text-align:center;font-size:1.2em;font-weight:bold}

/* Kategori */
#kategori{display:flex;flex-wrap:wrap;gap:5px;padding:10px}
#kategori button{
  background:#e0f7fa;border:none;border-radius:20px;
  padding:6px 12px;font-size:0.85em;cursor:pointer
}
#kategori button:hover{background:#00e5ff;color:#000}

/* Produk */
#produk{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  padding:10px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  height:180px; /* bikin rata */
}

.card h4{
  margin:0;
  font-size:0.9em;
  height:36px;          /* batasi tinggi judul */
  overflow:hidden;
}

.harga{
  color:#e91e63;
  font-weight:bold;
  font-size:0.95em;
}

.selisih{
  font-size:11px;
  color:#666;
}

.qty{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:auto; /* dorong ke bawah */
}

.qty button{
  width:28px;
  height:28px;
  background:#eee;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.qty input{
  width:40px;
  text-align:center;
  border-radius:6px;
  border:1px solid #ccc;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  transition:0.2s;
}
/* Label */
.termurah{background:#d4edda;color:#155724;padding:2px 6px;border-radius:5px;font-size:10px}
.mahal{background:#f8d7da;color:#721c24;padding:2px 6px;border-radius:5px;font-size:10px}
.rekomendasi{
  background:#fff3cd;color:#856404;
  padding:5px;border-radius:6px;font-size:11px
}
.selisih{font-size:11px;color:#666}

/* Floating */
#floatingTotal{
  position:fixed;bottom:70px;right:10px;
  background:#fff;padding:6px 12px;border-radius:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
  font-weight:bold;z-index:2
}

/* Footer */
.footer{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;display:flex;justify-content:space-around;
  padding:5px 0;box-shadow:0 -2px 5px rgba(0,0,0,.1)
}
.footer button{
  width:50px;height:50px;border-radius:50%;
  border:none;color:#fff;font-size:18px
}
.keranjang{background:#4caf50}
.reset{background:#f44336}
.admin{background:#555}

.admin-panel{
  display:none;padding:10px;background:#fff3cd;
  margin:10px;border-radius:10px
}
</style>
</head>

<body>

<header>Duta Terang LED</header>

<!-- SEARCH -->
<div style="padding:10px">
  <input 
    id="search" 
    placeholder="Ketik watt / nama... contoh: 12"
    style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc"
    oninput="cari(this.value)"
  >
</div>

<!-- KATEGORI -->
<div id="kategori"></div>

<div id="produk"></div>

<div id="floatingTotal">0 Barang | Rp 0</div>

<div class="footer">
  <button class="keranjang" onclick="focusSearch()">🔍</button>
  <button class="keranjang" onclick="checkout()">🛒</button>
  <button class="reset" onclick="resetCart()">🔄</button>
</div>

<div class="admin-panel" id="adminPanel">
  <b>Admin Panel</b><br>
  (nanti bisa tambah edit produk disini)
</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyvF-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";
const noWA = "6288224166270";
// ===== WAJIB ADA =====
function getWatt(nama){
 let m = nama.match(/(\d+)/);
 return m ? m[0] : "";
}

function getMerk(nama){
 nama = nama.toUpperCase();

 if(nama.includes("MSL")) return "MSL";
 if(nama.includes("RX")) return "RX";
 if(nama.includes("JS")) return "JS";
 if(nama.includes("FPL")) return "FPL";

 return "LAIN";
}
let produkList = [];
let currentData = []; // ✅ TAMBAH INI
let cart = JSON.parse(localStorage.getItem("cart")||"{}");

// LOAD DATA
fetch(apiURL)
.then(res=>res.json())
.then(data=>{
 let rows = data.data || data;

 rows.forEach((r,i)=>{
  produkList.push({
  id:i,
  nama:r.nama,
  harga:+r.harga,
  kategori:(r.kategori || "").toUpperCase()

  });
 });

 buatKategori();
 currentData = produkList;
tampil(currentData);// ⬅️ ini yang bikin awal kosong
});
// =====================
// KATEGORI
// =====================
function buatKategori(){
 let set = new Set();

 produkList.forEach(p=>{
  let k = (p.kategori || "").trim();

  // hanya ambil kategori yang benar
  if(k && !k.match(/[0-9]/)){
    set.add(k);
  }
 });

 let html = `<button onclick="tampil(produkList)">SEMUA</button>`;

 set.forEach(k=>{
  html+=`<button onclick="klikKategori('${k}')">${k}</button>`;
 });

 document.getElementById("kategori").innerHTML = html;
}

function klikKategori(kategori){
 currentData = produkList.filter(p=>p.kategori === kategori);
 tampil(currentData);
}

// =====================
// SEARCH (FIX UTAMA)
// =====================
function cari(text){
 text = text.toLowerCase().trim();

 if(!text){
   currentData = [];
   tampilKosong();
   return;
 }

 let hasil = produkList.filter(p=>{
   let nama = p.nama.toLowerCase();
   let watt = getWatt(p.nama);
   let merk = getMerk(p.nama).toLowerCase();

   return (
     nama.includes(text) ||
     watt == text ||
     merk == text
   );
 });

 currentData = hasil;
 tampil(currentData);
}
// =====================
// TAMPIL
// =====================
function tampilKosong(){
 document.getElementById("produk").innerHTML = 
 "<p style='padding:10px;color:#888'>Ketik di atas untuk cari produk</p>";
}

function tampil(data){
 let html="";

 if(data.length==0){
   html="<p style='padding:10px'>Tidak ditemukan</p>";
 }

 // urutkan langsung berdasarkan harga termurah
 data.sort((a,b)=>a.harga-b.harga);

 let min = Math.min(...data.map(p=>p.harga));

 data.forEach(p=>{
   let qty = cart[p.id]||0;

   let label = p.harga==min 
     ? `<span class="termurah">TERMURAH</span>` 
     : "";

   let selisih = p.harga - min;

   html+=`
   <div class="card">
     <h4>${p.nama} ${label}</h4>

     <div class="harga">
       Rp ${p.harga.toLocaleString()}
     </div>

     <div class="selisih">
       Selisih: Rp ${selisih.toLocaleString()}
     </div>

     <div class="qty">
       <button onclick="ubah(${p.id},-1)">-</button>
       <input value="${qty}" onchange="manual(${p.id},this.value)">
       <button onclick="ubah(${p.id},1)">+</button>
     </div>
   </div>`;
 });

 document.getElementById("produk").innerHTML = html;
 hitungTotal();
}
// =====================
// CART
// =====================
function ubah(id,val){
 cart[id]=(cart[id]||0)+val;
 if(cart[id]<0) cart[id]=0;
 simpan();
}

function manual(id,val){
 cart[id]=parseInt(val)||0;
 simpan();
}

function simpan(){
 localStorage.setItem("cart",JSON.stringify(cart));
 tampil(currentData); // ✅ tidak reset lagi
}

// =====================
// TOTAL
// =====================
function hitungTotal(){
 let total=0,count=0;

 produkList.forEach(p=>{
  let q=cart[p.id]||0;
  total+=q*p.harga;
  count+=q;
 });

 document.getElementById("floatingTotal").innerText =
 `${count} Barang | Rp ${total.toLocaleString()}`;
}

// =====================
// RESET
// =====================
function resetCart(){
 cart={};
 simpan();
}

// =====================
// CHECKOUT WA
// =====================
function checkout(){
 let text="Order:\n";

 produkList.forEach(p=>{
  let q=cart[p.id];
  if(q>0) text+=`${p.nama} x${q}\n`;
 });

 window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(text)}`);
}

// =====================
// TAMBAH DI SINI 👇
// =====================
function focusSearch(){
 let s = document.getElementById("search");
 s.focus();
 s.select(); // langsung siap ketik ulang
}
</script>

</body>
</html>
