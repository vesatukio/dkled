<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toko LED</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}
header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}
.container{
  padding:10px;
}
.produk{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:6px;
}
button{
  padding:6px 10px;
  border:none;
  background:#28a745;
  color:#fff;
  border-radius:4px;
  cursor:pointer;
}
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:10px;
  border-top:2px solid #ccc;
}
.kategori button{
  margin:3px;
  background:#007bff;
}
</style>
</head>

<body>

<header>
  <h2>Toko Duta Terang LED</h2>
</header>

<div class="container">

  <div class="kategori">
    <button onclick="setKategori('All')">Semua</button>
    <button onclick="setKategori('Lampu')">Lampu</button>
    <button onclick="setKategori('Driver')">Driver</button>
    <button onclick="setKategori('Aksesoris')">Aksesoris</button>
  </div>

  <div id="produkList"></div>

</div>

<div class="cart">
  <b>Keranjang:</b>
  <span id="cartInfo"></span>
  <br>
  <b>Total: Rp <span id="totalHarga">0</span></b>
</div>

<script>
const firebaseConfig={
 apiKey:"AIzaSyAt3",
 authDomain:"katalog-lampu.firebaseapp.com",
 databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com",
 projectId:"katalog-lampu"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let semuaProduk=[];
let cart=JSON.parse(localStorage.getItem("cart")||"{}");
let kategoriAktif="All";

// Ambil data dari Firebase
db.ref("produk").on("value",snap=>{
  semuaProduk=[];
  snap.forEach(d=>{
    semuaProduk.push({id:d.key,...d.val()});
  });
  tampilkanProduk();
});

function setKategori(k){
  kategoriAktif=k;
  tampilkanProduk();
}

function tampilkanProduk(){
  let html="";
  
  semuaProduk
  .filter(p=>kategoriAktif==="All" || p.kategori===kategoriAktif)
  .forEach(p=>{
    html+=`
      <div class="produk">
        <b>${p.nama}</b><br>
        Rp ${p.harga}<br>
        <small>${p.kategori}</small><br><br>
        <button onclick="tambahCart('${p.id}')">+ Keranjang</button>
      </div>
    `;
  });

  document.getElementById("produkList").innerHTML=html;
}

function tambahCart(id){
  if(!cart[id]) cart[id]=0;
  cart[id]++;
  simpanCart();
}

function simpanCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  let total=0;
  let text="";

  semuaProduk.forEach(p=>{
    if(cart[p.id]){
      let jumlah=cart[p.id];
      let sub=jumlah*p.harga;
      total+=sub;
      text+=`${p.nama}(${jumlah}) `;
    }
  });

  document.getElementById("cartInfo").innerText=text;
  document.getElementById("totalHarga").innerText=total;
}

renderCart();
</script>

</body>
</html>
