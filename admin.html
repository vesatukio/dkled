<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin DK LED</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<style>
body{font-family:'Poppins',sans-serif;margin:0;padding:15px;background:#f5f5f5;}
h2,h3{margin:10px 0;}
.box{background:white;padding:15px;border-radius:8px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input,select,button{width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:6px;font-size:14px;}
button{border:none;background:#ff6a00;color:white;cursor:pointer;}
button:hover{opacity:0.9;}
.produk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.produk{background:white;padding:10px;border-radius:8px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.produk img{width:100%;height:100px;object-fit:cover;border-radius:6px;}
.label{position:absolute;background:red;color:white;padding:4px;border-radius:4px;font-size:12px;top:5px;left:5px;}
#listKategori button.active{background:#ff6a00;color:white;}
#listKategori button{background:#ddd;color:black;margin:3px;}
.stok-controls{display:flex;align-items:center;gap:5px;margin:5px 0;}
.stok-controls button{width:25px;padding:0;}
</style>
</head>
<body>

<h2>Admin DK LED</h2>

<div class="box">
  <h3>Tambah Produk</h3>
  <input id="nama" placeholder="Nama produk">
  <input id="harga" type="number" placeholder="Harga">
  <input id="diskon_nominal" type="number" placeholder="Diskon nominal">
  <input id="diskon_persen" type="number" placeholder="Diskon persen">
  <select id="kategori"></select>
  <input type="file" id="fileGambar">
  <button onclick="uploadGambar()">Upload Gambar</button>
  <input id="gambar" placeholder="URL Gambar" readonly>
  <button onclick="tambahProduk()">Simpan Produk</button>
</div>

<div class="box">
  <h3>Kategori</h3>
  <input id="kategoriBaru" placeholder="Nama kategori">
  <button onclick="tambahKategori()">Tambah</button>
  <div id="listKategori"></div>
</div>

<h3>Daftar Produk</h3>
<div id="listProduk" class="produk-grid"></div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyAt3",
  authDomain:"katalog-lampu.firebaseapp.com",
  databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com",
  projectId:"katalog-lampu"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const storage=firebase.storage();

let kategoriAktif="";
let uploadedGambarURL="";

// Upload Gambar
function uploadGambar(){
  const file=document.getElementById("fileGambar").files[0];
  if(!file){ alert("Pilih file gambar dulu!"); return; }
  const ref=storage.ref("produk/"+file.name);
  ref.put(file).then(()=>ref.getDownloadURL().then(url=>{
    uploadedGambarURL=url;
    document.getElementById("gambar").value=url;
    alert("Gambar berhasil diupload!");
  })).catch(err=>alert(err));
}

// Produk
function tambahProduk(){
  const nama=document.getElementById("nama").value;
  const harga=parseInt(document.getElementById("harga").value);
  const diskon_nominal=parseInt(document.getElementById("diskon_nominal").value)||0;
  const diskon_persen=parseInt(document.getElementById("diskon_persen").value)||0;
  const kategori=document.getElementById("kategori").value;
  const gambar=uploadedGambarURL||document.getElementById("gambar").value||'';

  if(!nama || !harga || !kategori){ alert("Nama, harga, kategori wajib diisi"); return; }

  db.ref("produk").push({nama,harga,diskon_nominal,diskon_persen,kategori,stok:0,gambar});
  tampilProdukPerKategori(kategoriAktif);

  document.getElementById("nama").value="";
  document.getElementById("harga").value="";
  document.getElementById("diskon_nominal").value="";
  document.getElementById("diskon_persen").value="";
  document.getElementById("kategori").value="";
  document.getElementById("fileGambar").value="";
  document.getElementById("gambar").value="";
  uploadedGambarURL="";
}

function editProduk(id){
  db.ref("produk/"+id).once("value").then(snap=>{
    const p=snap.val();
    const nama=prompt("Nama",p.nama);
    const harga=prompt("Harga",p.harga);
    const diskon_nominal=prompt("Diskon nominal",p.diskon_nominal||0);
    const diskon_persen=prompt("Diskon persen",p.diskon_persen||0);
    const stok=prompt("Stok",p.stok||0);
    const kategori=prompt("Kategori",p.kategori);
    const gambar=prompt("URL Gambar",p.gambar||"");
    db.ref("produk/"+id).update({nama, harga:Number(harga), diskon_nominal:Number(diskon_nominal), diskon_persen:Number(diskon_persen), stok:Number(stok), kategori, gambar});
    tampilProdukPerKategori(kategoriAktif);
  });
}

function hapusProduk(id){
  if(confirm("Hapus produk?")) db.ref("produk/"+id).remove().then(()=>tampilProdukPerKategori(kategoriAktif));
}

// Stok + / -
function ubahStok(id,val){
  const stok = Number(val);
  if(stok<0){ alert("Stok minimal 0"); return; }
  db.ref("produk/"+id).update({stok}).then(()=>tampilProdukPerKategori(kategoriAktif));
}

function tambahKategori(){
  const nama = document.getElementById("kategoriBaru").value.trim();
  if(!nama){ alert("Isi nama kategori"); return; }
  
  // Cek apakah kategori sudah ada
  db.ref("kategori").orderByChild("nama").equalTo(nama).once("value").then(snap=>{
    if(snap.exists()){ alert("Kategori sudah ada!"); return; }
    
    db.ref("kategori").push({nama}).then(()=>{
      document.getElementById("kategoriBaru").value="";
      tampilKategori();
    });
  });
}

function hapusKategori(id){
  if(confirm("Hapus kategori ini? Produk terkait kategori ini akan dikosongkan")){
    db.ref("kategori/"+id).once("value").then(snap=>{
      const namaKategori = snap.val().nama;
      db.ref("kategori/"+id).remove().then(()=>{
        // Kosongkan kategori pada produk yang memakai kategori ini
        db.ref("produk").once("value").then(produkSnap=>{
          produkSnap.forEach(child=>{
            if(child.val().kategori === namaKategori){
              db.ref("produk/"+child.key).update({kategori:""});
            }
          });
          tampilKategori();
          tampilProdukPerKategori("");
        });
      });
    });
  }
}

function tampilKategori(){
  db.ref("kategori").once("value").then(snap=>{
    let html="<button onclick=\"tampilProdukPerKategori(''); kategoriAktif=''; highlightKategori()\">Semua</button>", option="<option>--Pilih--</option>";
    snap.forEach(child=>{
      const k = child.val();
      // Tombol kategori dengan hapus
      html += `<button onclick="tampilProdukPerKategori('${k.nama}'); kategoriAktif='${k.nama}'; highlightKategori()">${k.nama}</button>
               <button style="background:red;color:white;margin:3px;" onclick="hapusKategori('${child.key}')">x</button>`;
      option += `<option>${k.nama}</option>`;
    });
    document.getElementById("listKategori").innerHTML = html;
    document.getElementById("kategori").innerHTML = option;
    highlightKategori();
  });
}
function highlightKategori(){
  document.querySelectorAll("#listKategori button").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText===kategoriAktif || (kategoriAktif=="" && btn.innerText==="Semua")) btn.classList.add("active");
  });
}

function tampilProdukPerKategori(kat=""){
  kategoriAktif=kat;
  db.ref("produk").once("value").then(snap=>{
    let html="";
    snap.forEach(child=>{
      const p=child.val(),id=child.key;
      if(kat && p.kategori!=kat) return;
      const harga=Number(p.harga)-Number(p.diskon_nominal||0)-Number(p.harga*(p.diskon_persen||0)/100);
      let label="";
      if(p.stok<=0) label="HABIS";
      else if(p.diskon_nominal) label="Diskon Rp."+p.diskon_nominal;
      else if(p.diskon_persen) label="Disc "+p.diskon_persen+"%";

      html+=`<div class="produk">
        ${label?`<div class="label">${label}</div>`:""}
        <b>${p.nama}</b><br>
        Harga: ${harga}<br>
        Kategori: ${p.kategori}<br>
        <div class="stok-controls">
          <button onclick="ubahStok('${id}',${(p.stok||0)-1})">-</button>
          <input type="number" value="${p.stok||0}" min="0" style="width:50px;" onchange="ubahStok('${id}',this.value)">
          <button onclick="ubahStok('${id}',${(p.stok||0)+1})">+</button>
        </div>
        <img src="${p.gambar||'https://via.placeholder.com/150'}"><br>
        <button onclick="editProduk('${id}')">Edit</button>
        <button onclick="hapusProduk('${id}')">Hapus</button>
      </div>`;
    });
    document.getElementById("listProduk").innerHTML=html;
  });
}

// Init
tampilKategori();
tampilProdukPerKategori("");
</script>
</body>
</html>
