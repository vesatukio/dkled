<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin DK LED</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
body{font-family:sans-serif;padding:10px;background:#f5f5f5}
input{margin:4px;padding:6px;width:100%}
button{margin:4px;padding:8px;background:#ff6a00;color:white;border:none}
.card{background:white;padding:10px;margin-bottom:8px}
</style>
</head>
<body>

<h2>Admin Produk</h2>

<input id="nama" placeholder="Nama produk">
<input id="harga" placeholder="Harga">
<input id="qty1" placeholder="Qty 1">
<input id="diskon1" placeholder="Diskon 1 %">
<input id="qty2" placeholder="Qty 2">
<input id="diskon2" placeholder="Diskon 2 %">
<input id="qty3" placeholder="Qty 3">
<input id="diskon3" placeholder="Diskon 3 %">
<button onclick="simpan()">Simpan Produk</button>

<hr>
<div id="list"></div>

<script>
const firebaseConfig={apiKey:"AIzaSyAt3",databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let editId=null;

function simpan(){
 let data={
  nama:document.getElementById("nama").value,
  harga:Number(document.getElementById("harga").value),
  qty1:Number(qty1.value),
  diskon1:Number(diskon1.value),
  qty2:Number(qty2.value),
  diskon2:Number(diskon2.value),
  qty3:Number(qty3.value),
  diskon3:Number(diskon3.value),
  stok:1
 };

 if(editId){
  db.ref("produk/"+editId).update(data);
  editId=null;
 }else{
  db.ref("produk").push(data);
 }
 kosong();
}

function kosong(){
 document.querySelectorAll("input").forEach(i=>i.value="");
}

function load(){
 db.ref("produk").on("value",snap=>{
  let html="";
  snap.forEach(c=>{
    let p=c.val();
    let id=c.key;

    html+=`<div class="card">
    <b>${p.nama}</b><br>
    Harga: ${p.harga}<br>
    <button onclick="edit('${id}')">Edit</button>
    <button onclick="hapus('${id}')">Hapus</button>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
 });
}

function edit(id){
 db.ref("produk/"+id).once("value").then(s=>{
  let p=s.val();
  nama.value=p.nama;
  harga.value=p.harga;
  qty1.value=p.qty1;
  diskon1.value=p.diskon1;
  qty2.value=p.qty2;
  diskon2.value=p.diskon2;
  qty3.value=p.qty3;
  diskon3.value=p.diskon3;
  editId=id;
 });
}

function hapus(id){
 if(confirm("Hapus produk?")) db.ref("produk/"+id).remove();
}

load();
</script>

</body>
</html>
