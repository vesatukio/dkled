 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin DK LED</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f5f5;padding:15px;}
.box{background:white;padding:12px;border-radius:8px;margin-bottom:10px;}
input,select{width:100%;padding:8px;margin-bottom:8px;border:1px solid #ddd;border-radius:6px;}
button{padding:8px 12px;border:none;border-radius:6px;background:#ff6a00;color:white;cursor:pointer;}
.produk,.card{background:white;padding:10px;border-radius:8px;margin-bottom:6px;}
.card img{width:100%;height:100px;object-fit:cover;border-radius:6px;}
</style>
</head>
<body>

<h2>Admin DK LED</h2>

<!-- Form Tambah Produk -->
<div class="box">
  <h3>Tambah Produk</h3>
  <input id="nama" placeholder="Nama produk">
  <input id="harga" placeholder="Harga">
  <input id="diskon_nominal" placeholder="Diskon nominal">
  <input id="diskon_persen" placeholder="Diskon persen">
  <select id="kategori"></select>
  <input id="gambar" placeholder="URL Gambar">
  <button onclick="tambahProduk()">Simpan Produk</button>
</div>

<!-- Form Kategori -->
<div class="box">
  <h3>Kategori</h3>
  <input id="kategoriBaru" placeholder="Nama kategori">
  <button onclick="tambahKategori()">Tambah</button>
  <div id="listKategori"></div>
</div>

<h3>Daftar Produk</h3>
<div id="listProduk"></div>

<script>
// Firebase
const firebaseConfig={
  apiKey:"AIzaSyAt3",
  authDomain:"katalog-lampu.firebaseapp.com",
  databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com",
  projectId:"katalog-lampu"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// --- PRODUK ---
function tambahProduk(){
  let nama=document.getElementById("nama").value;
  let harga=parseInt(document.getElementById("harga").value);
  let diskon_nominal=parseInt(document.getElementById("diskon_nominal").value)||0;
  let diskon_persen=parseInt(document.getElementById("diskon_persen").value)||0;
  let kategori=document.getElementById("kategori").value;
  let gambar=document.getElementById("gambar").value;

  db.ref("produk").push({nama,harga,diskon_nominal,diskon_persen,kategori,stok:0,gambar});
  alert("Produk ditambahkan");
  tampilProdukPerKategori(kategoriAktif);
}

function editProduk(id){
  db.ref("produk/"+id).once("value").then(snap=>{
    let p=snap.val();
    let nama=prompt("Nama",p.nama);
    let harga=prompt("Harga",p.harga);
    let diskon_nominal=prompt("Diskon nominal",p.diskon_nominal||0);
    let diskon_persen=prompt("Diskon persen",p.diskon_persen||0);
    let kategori=prompt("Kategori",p.kategori);
    let gambar=prompt("URL Gambar",p.gambar||"");
    db.ref("produk/"+id).update({nama,harga:Number(harga),diskon_nominal:Number(diskon_nominal),diskon_persen:Number(diskon_persen),kategori,gambar});
    tampilProdukPerKategori(kategoriAktif);
  });
}

function hapusProduk(id){
  if(confirm("Hapus produk?")) db.ref("produk/"+id).remove();
}

function ubahStok(id,val){
  db.ref("produk/"+id).update({stok:Number(val)}).then(()=>{alert("Stok berhasil diupdate!")});
}

// --- KATEGORI ---
function tambahKategori(){
  let nama=document.getElementById("kategoriBaru").value;
  db.ref("kategori").push({nama});
  tampilKategori();
}

function hapusKategori(id){
  db.ref("kategori/"+id).remove();
  tampilKategori();
}

let kategoriAktif="";
function tampilKategori(){
  db.ref("kategori").once("value").then(snap=>{
    let html="",option="<option>--Pilih--</option>";
    html+=`<button onclick="tampilProdukPerKategori('');kategoriAktif='';highlightKategori()">Semua</button>`;
    snap.forEach(child=>{
      let k=child.val();
      html+=`<button onclick="tampilProdukPerKategori('${k.nama}');kategoriAktif='${k.nama}';highlightKategori()">${k.nama}</button>`;
      option+=`<option>${k.nama}</option>`;
    });
    document.getElementById("listKategori").innerHTML=html;
    document.getElementById("kategori").innerHTML=option;
    highlightKategori();
  });
}

function highlightKategori(){
  document.querySelectorAll("#listKategori button").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText===kategoriAktif || (kategoriAktif=="" && btn.innerText==="Semua")) btn.classList.add("active");
  });
}

// --- TAMPIL PRODUK PER KATEGORI ---
function tampilProdukPerKategori(kat=""){
  kategoriAktif=kat;
  db.ref("produk").once("value").then(snap=>{
    let html="";
    snap.forEach(child=>{
      let p=child.val(),id=child.key,stok=p.stok||0;
      if(kat && p.kategori!=kat) return;

      // Kategori Galeri khusus gambar
      if(kat==="Galeri"){
        html+=`<div class="card"><img src="${p.gambar||'https://via.placeholder.com/150'}"></div>`;
        return;
      }

      let harga=Number(p.harga)||0;
      if(p.diskon_nominal) harga-=Number(p.diskon_nominal);
      if(p.diskon_persen) harga-=Number(p.harga)*Number(p.diskon_persen)/100;

      let labelTampil = (p.stok<=0) ? "HABIS" : (p.diskon_nominal ? `Diskon Rp.${p.diskon_nominal}` : (p.diskon_persen ? `Disc ${p.diskon_persen}%` : ""));

      html+=`
      <div class="produk" style="${p.stok<=0?'opacity:0.5;pointer-events:none;':''}">
        ${labelTampil?`<div style="position:absolute;background:red;color:white;padding:4px;border-radius:4px;">${labelTampil}</div>`:""}
        <b>${p.nama}</b><br>
        Harga : ${harga}<br>
        Kategori : ${p.kategori}<br>
        Stok : <input type="number" value="${stok}" min="0" onchange="ubahStok('${id}',this.value)"><br>
        <img src="${p.gambar||'https://via.placeholder.com/150'}" style="width:100px;height:100px;object-fit:cover;border-radius:6px;"><br>
        <button onclick="editProduk('${id}')">Edit</button>
        <button onclick="hapusProduk('${id}')">Hapus</button>
      </div>`;
    });
    document.getElementById("listProduk").innerHTML=html;
  });
}

// Inisialisasi
tampilKategori();
tampilProdukPerKategori("");
</script>

</body>
</html>
