<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin DK LED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f5f5;
padding:15px;
}

.box{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

input,select{
width:100%;
padding:8px;
margin-bottom:8px;
border:1px solid #ddd;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#ff6a00;
color:white;
}

.produk{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:6px;
}

</style>

</head>

<body>

<h2>Admin DK LED</h2>

<div class="box">

<h3>Tambah Produk</h3>

<input id="nama" placeholder="Nama produk">

<input id="harga" placeholder="Harga">

<input id="diskon_nominal" placeholder="Diskon nominal">

<input id="diskon_persen" placeholder="Diskon persen">

<select id="kategori"></select>

<button onclick="tambahProduk()">Simpan Produk</button>

</div>

<div class="box">

<h3>Kategori</h3>

<input id="kategoriBaru" placeholder="Nama kategori">

<button onclick="tambahKategori()">Tambah</button>

<div id="listKategori"></div>

</div>

<h3>Daftar Produk</h3>

<div id="listProduk"></div>

<script>

const firebaseConfig={
apiKey:"AIzaSyAt3",
authDomain:"katalog-lampu.firebaseapp.com",
databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com",
projectId:"katalog-lampu"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

function tambahProduk(){

let nama=document.getElementById("nama").value
let harga=parseInt(document.getElementById("harga").value)
let diskon_nominal=parseInt(document.getElementById("diskon_nominal").value)||0
let diskon_persen=parseInt(document.getElementById("diskon_persen").value)||0
let kategori=document.getElementById("kategori").value

db.ref("produk").push({

nama,
harga,
diskon_nominal,
diskon_persen,
kategori

})

alert("Produk ditambahkan")

}

function tampilProduk(){

db.ref("produk").on("value",snap=>{

let html=""

snap.forEach(child=>{

let p=child.val()
let id=child.key



`let stok = p.stok || 0; // default 0 jika belum ada

html+=`
<div class="produk">
<b>${p.nama}</b>
<br>
Harga : ${p.harga}
<br>
Kategori : ${p.kategori}
<br>
Stok : <input type="number" value="${stok}" min="0" onchange="ubahStok('${id}', this.value)">
<br>
<button onclick="editProduk('${id}')">Edit</button>
<button onclick="hapusProduk('${id}')">Hapus</button>
</div>
`

})

document.getElementById("listProduk").innerHTML=html

})

}

function editProduk(id){

db.ref("produk/"+id).once("value").then(snap=>{

let p=snap.val()

let nama=prompt("Nama",p.nama)
let harga=prompt("Harga",p.harga)
let diskon_nominal=prompt("Diskon nominal",p.diskon_nominal||0)
let diskon_persen=prompt("Diskon persen",p.diskon_persen||0)
let kategori=prompt("Kategori",p.kategori)

db.ref("produk/"+id).update({

nama,
harga:Number(harga),
diskon_nominal:Number(diskon_nominal),
diskon_persen:Number(diskon_persen),
kategori

})

})

}

function hapusProduk(id){

if(confirm("Hapus produk?")){

db.ref("produk/"+id).remove()

}

}

function tambahKategori(){

let nama=document.getElementById("kategoriBaru").value

db.ref("kategori").push({

nama

})

}

function tampilKategori(){

db.ref("kategori").on("value",snap=>{

let html=""
let option=""

snap.forEach(child=>{

let k=child.val()

html+=`

<div>

${k.nama}

<button onclick="hapusKategori('${child.key}')">Hapus</button>

</div>

`

option+=`<option>${k.nama}</option>`

})

document.getElementById("listKategori").innerHTML=html
document.getElementById("kategori").innerHTML=option

})

}

function hapusKategori(id){

db.ref("kategori/"+id).remove()

}

tampilKategori()
tampilProduk()
function ubahStok(id, val){
    val = Number(val);
    db.ref("produk/"+id).update({stok: val}).then(()=>{
        alert("Stok berhasil diupdate!");
    });
}
    <script>
  // Inisialisasi Firebase
  const firebaseConfig={
    apiKey:"AIzaSyAt3",
    authDomain:"katalog-lampu.firebaseapp.com",
    databaseURL:"https://katalog-lampu-default-rtdb.firebaseio.com",
    projectId:"katalog-lampu"
  }
  firebase.initializeApp(firebaseConfig)
  const db=firebase.database()

  // Fungsi untuk update stok produk
  function ubahStok(id, val){
      val = Number(val);
      db.ref("produk/"+id).update({stok: val}).then(()=>{
          alert("Stok berhasil diupdate!");
      });
  }

  // Fungsi tambah produk, edit produk, hapus produk, dll...
  function tambahProduk(){ /* ... */ }
  function editProduk(id){ /* ... */ }
  function hapusProduk(id){ /* ... */ }

  // Fungsi tampilkan produk di admin
  function tampilProduk(){
      db.ref("produk").on("value",snap=>{
          let html=""
          snap.forEach(child=>{
              let p=child.val()
              let id=child.key
              let stok = p.stok || 0

              html+=`
              <div class="produk">
                <b>${p.nama}</b><br>
                Harga : ${p.harga}<br>
                Kategori : ${p.kategori}<br>
                Stok : <input type="number" value="${stok}" min="0" onchange="ubahStok('${id}', this.value)"><br>
                <button onclick="editProduk('${id}')">Edit</button>
                <button onclick="hapusProduk('${id}')">Hapus</button>
              </div>
              `
          })
          document.getElementById("listProduk").innerHTML=html
      })
  }

  tampilProduk()
</script>
</script>

</body>

</html>
