<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body style="font-family:sans-serif">

<h2>Admin Produk</h2>

<input id="nama" placeholder="Nama"><br>
<input id="harga" placeholder="Harga"><br>
<input id="d1" placeholder="Diskon 1"><br>
<input id="d2" placeholder="Diskon 2"><br>
<input id="d3" placeholder="Diskon 3"><br>
<input id="kategori" placeholder="Kategori"><br><br>

<button onclick="tambah()">Tambah Produk</button>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbyvF-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";

function tambah(){
 fetch(apiURL,{
  method:"POST",
  body:JSON.stringify({
    action:"tambah",
    nama:nama.value,
    harga:harga.value,
    d1:d1.value,
    d2:d2.value,
    d3:d3.value,
    kategori:kategori.value
  })
 })
 .then(res=>res.text())
 .then(()=>alert("Berhasil tambah"));
}
</script>

</body>
</html>
