<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Duta Terang LED</title>
<style>
body{font-family:sans-serif;margin:0;padding:20px;background:#f5f5f5}
h1{text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#eee}
button{padding:5px 10px;margin:2px;cursor:pointer}
input[type=text], input[type=number]{width:100%;padding:5px;box-sizing:border-box}
</style>
</head>
<body>
<h1>Admin Panel - Duta Terang LED</h1>

<!-- Form tambah / edit -->
<div style="max-width:500px;margin:auto">
  <input type="hidden" id="row">
  <label>Nama:</label>
  <input type="text" id="nama">
  <label>Harga:</label>
  <input type="number" id="harga">
  <label>Diskon 1 (%):</label>
  <input type="number" id="diskon1">
  <label>Diskon 2 (%):</label>
  <input type="number" id="diskon2">
  <label>Diskon 3 (%):</label>
  <input type="number" id="diskon3">
  <label>Kategori:</label>
  <input type="text" id="kategori">
  <button onclick="tambahAtauEdit()">Simpan</button>
  <button onclick="resetForm()">Reset</button>
</div>

<!-- Tabel produk -->
<table id="produkTable">
  <thead>
    <tr>
      <th>Row</th>
      <th>Nama</th>
      <th>Harga</th>
      <th>Diskon 1</th>
      <th>Diskon 2</th>
      <th>Diskon 3</th>
      <th>Kategori</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwL78CSg1-PSNo-bE7rXFsqU9KWymV2ZsTxHzy8Y-I/dev"; // ganti dengan URL Web App

// ambil data
async function loadProduk(){
  const res = await fetch(API_URL);
  const data = await res.json();
  const tbody = document.querySelector("#produkTable tbody");
  tbody.innerHTML = "";
  data.forEach(p=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.row}</td>
      <td>${p.nama}</td>
      <td>${p.harga}</td>
      <td>${p.diskon1}</td>
      <td>${p.diskon2}</td>
      <td>${p.diskon3}</td>
      <td>${p.kategori}</td>
      <td>
        <button onclick='editProduk(${JSON.stringify(p)})'>Edit</button>
        <button onclick='hapusProduk(${p.row})'>Hapus</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// tambah / edit produk
async function tambahAtauEdit(){
  const row = document.getElementById("row").value;
  const nama = document.getElementById("nama").value;
  const harga = document.getElementById("harga").value;
  const diskon1 = document.getElementById("diskon1").value;
  const diskon2 = document.getElementById("diskon2").value;
  const diskon3 = document.getElementById("diskon3").value;
  const kategori = document.getElementById("kategori").value;

  const action = row ? "edit" : "tambah";

  await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({action,row,nama,harga,diskon1,diskon2,diskon3,kategori})
  });

  resetForm();
  loadProduk();
}

// edit: isi form
function editProduk(p){
  document.getElementById("row").value = p.row;
  document.getElementById("nama").value = p.nama;
  document.getElementById("harga").value = p.harga;
  document.getElementById("diskon1").value = p.diskon1;
  document.getElementById("diskon2").value = p.diskon2;
  document.getElementById("diskon3").value = p.diskon3;
  document.getElementById("kategori").value = p.kategori;
}

// hapus
async function hapusProduk(row){
  if(confirm("Yakin hapus produk ini?")){
    await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({action:"hapus",row})
    });
    loadProduk();
  }
}

// reset form
function resetForm(){
  document.getElementById("row").value="";
  document.getElementById("nama").value="";
  document.getElementById("harga").value="";
  document.getElementById("diskon1").value="";
  document.getElementById("diskon2").value="";
  document.getElementById("diskon3").value="";
  document.getElementById("kategori").value="";
}

// load awal
loadProduk();
</script>
</body>
</html>
