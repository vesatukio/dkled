<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Produk</title>

<style>
body{font-family:sans-serif;padding:10px}
input{margin:3px;padding:5px}
button{margin:3px;padding:5px}
.card{
border:1px solid #ccc;
padding:10px;
margin:5px;
border-radius:8px
}
</style>
</head>

<body>

<h2>Admin Produk</h2>

<h3>Tambah / Edit</h3>
<input id="nama" placeholder="Nama"><br>
<input id="harga" placeholder="Harga"><br>
<input id="d1" placeholder="Diskon 1"><br>
<input id="d2" placeholder="Diskon 2"><br>
<input id="d3" placeholder="Diskon 3"><br>
<input id="kategori" placeholder="Kategori"><br>

<button onclick="tambah()">Tambah</button>
<button onclick="edit()">Update</button>

<hr>

<h3>Daftar Produk</h3>
<div id="list"></div>

<script>
const api = "https://script.google.com/macros/s/AKfycbyvF-VzgZyEzaPup3-M7UCCq8fdHoyW4QIIDAUXjV8TUHgd8kOdbiU2rRonnmDY_dzM/exec";

let dataProduk=[];

function load(){
 fetch(api)
 .then(res=>res.json())
 .then(data=>{
  dataProduk=data;
  tampil();
 });
}

function tampil(){
 let html="";

 dataProduk.forEach(p=>{
 html+=`
 <div class="card">
  <b>${p.nama}</b><br>
  Rp ${p.harga}<br>

  <button onclick='isi(${JSON.stringify(p)})'>Edit</button>
  <button onclick='hapus("${p.nama}")'>Hapus</button>
 </div>
 `;
 });

 document.getElementById("list").innerHTML=html;
}

function isi(p){
 nama.value=p.nama;
 harga.value=p.harga;
 d1.value=p["diskon 1"];
 d2.value=p["diskon 2"];
 d3.value=p["diskon3"];
 kategori.value=p.kategori;

 window.namaLama = p.nama;
}

function tambah(){
 fetch(api,{
  method:"POST",
  body:JSON.stringify({
    action:"tambah",
    nama:nama.value,
    harga:harga.value,
    "diskon 1":d1.value,
    "diskon 2":d2.value,
    "diskon3":d3.value,
    kategori:kategori.value
  })
 }).then(()=>load());
}

function edit(){
 fetch(api,{
  method:"POST",
  body:JSON.stringify({
    action:"edit",
    namaLama:window.namaLama,
    nama:nama.value,
    harga:harga.value,
    "diskon 1":d1.value,
    "diskon 2":d2.value,
    "diskon3":d3.value,
    kategori:kategori.value
  })
 }).then(()=>load());
}

function hapus(nama){
 if(confirm("Hapus?")){
  fetch(api,{
   method:"POST",
   body:JSON.stringify({
     action:"hapus",
     nama:nama
   })
  }).then(()=>load());
 }
}

load();
</script>

</body>
</html>
